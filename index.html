<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chocolate+Classical+Sans&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#231a14;
    --paper:#f3e9d2;
    --paper2:#ece0c3;
    --board:#2b4a3f;
    --board-edge:#1d3329;
    --chalk:#f1ece0;
    --stamp:#b53227;
    --stamp2:#c8632b;
    --brass:#a9852f;
    --leaf:#5d7a4e;
    --rule:#231a14;
    --shadow:rgba(35,26,20,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Noto Sans TC",sans-serif;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,.18), transparent 40%),
      repeating-linear-gradient(0deg, rgba(35,26,20,.018) 0 2px, transparent 2px 5px),
      var(--paper);
    color:var(--ink);
    overflow:hidden;
    -webkit-text-size-adjust:100%;
  }
  /* ---------- stage ---------- */
  #stage{position:fixed;inset:0;display:flex;flex-direction:column;}
  .slide{
    position:absolute;inset:0;
    display:none;flex-direction:column;
    padding:clamp(18px,5vw,52px) clamp(16px,5vw,60px) clamp(74px,12vw,90px);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    animation:fade .45s ease;
  }
  /* 包裹內容，短內容靠 margin:auto 垂直置中，長內容超出時仍從頂部正常捲動 */
  .slide > *{flex-shrink:0;}
  .slide::before,.slide::after{content:"";display:block;flex:1 0 0;min-height:0;}
  /* 封面用自身 flex 置中，不需外層彈性間隔（避免三個 flex:1 互擠造成偏下被裁） */
  .slide:has(.cover)::before,.slide:has(.cover)::after{display:none;}
  .slide.on{display:flex;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.slide{animation:none;}}

  /* ---------- shared bits ---------- */
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;align-self:flex-start;
    font-family:"Chocolate Classical Sans",serif;
    background:var(--stamp);color:#fff;
    padding:5px 14px;border-radius:2px;
    font-size:clamp(12px,3.4vw,15px);letter-spacing:2px;
    box-shadow:2px 2px 0 var(--ink);
    transform:rotate(-1.4deg);
  }
  .num-chip{
    font-family:"Chocolate Classical Sans",serif;
    font-size:clamp(11px,3vw,13px);letter-spacing:1px;
    color:var(--brass);
  }
  h1.title{
    font-family:"Noto Serif TC",serif;font-weight:900;
    font-size:clamp(30px,9vw,68px);line-height:1.05;
    margin:.35em 0 .25em;letter-spacing:1px;
  }
  h2.heading{
    font-family:"Noto Serif TC",serif;font-weight:900;
    font-size:clamp(24px,6.5vw,46px);line-height:1.12;
    margin:.18em 0 .5em;
    border-bottom:4px solid var(--ink);padding-bottom:.18em;
    display:inline-block;
  }
  p.lede{font-size:clamp(15px,4.2vw,22px);line-height:1.7;max-width:62ch;}
  .muted{color:#5c4a3a;}

  /* ---------- cover ---------- */
  .cover{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:left;}
  .cover .frame{
    border:5px double var(--ink);padding:clamp(20px,5vw,52px);
    background:var(--paper2);position:relative;
    width:100%;max-width:880px;margin:0 auto;
    box-shadow:6px 6px 0 var(--shadow);
  }
  .cover .corner{position:absolute;width:18px;height:18px;border:3px solid var(--ink);}
  .cover .corner.tl{top:8px;left:8px;border-right:0;border-bottom:0;}
  .cover .corner.tr{top:8px;right:8px;border-left:0;border-bottom:0;}
  .cover .corner.bl{bottom:8px;left:8px;border-right:0;border-top:0;}
  .cover .corner.br{bottom:8px;right:8px;border-left:0;border-top:0;}
  .cover .org{
    margin-top:18px;font-family:"Chocolate Classical Sans",serif;
    font-size:clamp(13px,3.6vw,17px);letter-spacing:1px;line-height:1.7;
    border-top:2px dashed var(--ink);padding-top:14px;
  }
  .stamp-round{
    position:absolute;right:8px;top:64px;
    width:clamp(78px,20vw,116px);height:clamp(78px,20vw,116px);border-radius:50%;
    border:3px solid var(--stamp);color:var(--stamp);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:"Chocolate Classical Sans",serif;text-align:center;
    transform:rotate(9deg);background:rgba(243,233,210,.6);
    font-size:clamp(11px,3vw,15px);line-height:1.25;letter-spacing:1px;
    box-shadow:0 0 0 4px rgba(181,50,39,.12);
  }

  /* ---------- agenda / schedule ---------- */
  .sched{display:flex;flex-direction:column;gap:10px;max-width:640px;margin-top:6px;}
  .sched-row{
    display:flex;align-items:center;gap:14px;
    background:var(--paper2);border:2px solid var(--ink);
    padding:12px 14px;box-shadow:3px 3px 0 var(--shadow);
  }
  .sched-row .t{
    font-family:"Chocolate Classical Sans",serif;
    background:var(--board);color:var(--chalk);
    padding:6px 10px;border-radius:3px;font-size:clamp(13px,3.6vw,16px);
    white-space:nowrap;letter-spacing:1px;
  }
  .sched-row .d{font-size:clamp(14px,3.8vw,18px);font-weight:500;}

  /* ---------- chalkboard ---------- */
  .board{
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,.05), transparent 55%),
      var(--board);
    border:10px solid #6b4a2a;border-radius:6px;
    box-shadow:inset 0 0 60px rgba(0,0,0,.45),6px 6px 0 var(--shadow);
    color:var(--chalk);padding:clamp(18px,5vw,34px);
    position:relative;
  }
  .board::after{content:"";position:absolute;inset:0;border:2px solid rgba(241,236,224,.18);margin:6px;border-radius:3px;pointer-events:none;}
  .board h3{font-family:"Chocolate Classical Sans",serif;font-size:clamp(20px,5.4vw,30px);margin-bottom:.5em;letter-spacing:1px;}
  .board .chalk-line{border:0;border-top:2px dashed rgba(241,236,224,.4);margin:.7em 0;}

  /* 3不4要 grid */
  .three-four{display:grid;grid-template-columns:1fr;gap:16px;margin-top:8px;}
  @media(min-width:680px){.three-four{grid-template-columns:1fr 1fr;}}
  .tf-card{border:2px solid var(--ink);background:#f7f0dd;padding:16px;box-shadow:3px 3px 0 rgba(0,0,0,.35);}
  .tf-card .tag{font-family:"Chocolate Classical Sans",serif;font-size:clamp(20px,5.4vw,28px);}
  .tf-card.no .tag{color:var(--stamp);}
  .tf-card.yes .tag{color:var(--leaf);}
  .tf-list{margin-top:10px;display:flex;flex-direction:column;gap:10px;}
  .tf-item{display:flex;gap:10px;align-items:flex-start;font-size:clamp(15px,4.1vw,19px);line-height:1.55;color:var(--ink);}
  .tf-item b{font-family:"Noto Serif TC",serif;font-weight:900;color:var(--ink);}
  .badge{flex:0 0 auto;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px;}
  .badge.x{background:var(--stamp);}
  .badge.o{background:var(--leaf);}

  /* generic content cards */
  .cards{display:grid;grid-template-columns:1fr;gap:14px;margin-top:6px;}
  @media(min-width:680px){.cards.two{grid-template-columns:1fr 1fr;}}
  @media(min-width:680px){.cards.three{grid-template-columns:1fr 1fr 1fr;}}
  .note-card{
    background:var(--paper2);border:2px solid var(--ink);
    padding:16px 18px;box-shadow:4px 4px 0 var(--shadow);position:relative;
  }
  .note-card .pin{position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;background:var(--stamp);box-shadow:0 2px 3px rgba(0,0,0,.3);}
  .note-card h4{font-family:"Noto Serif TC",serif;font-size:clamp(17px,4.6vw,23px);margin-bottom:.4em;display:flex;align-items:center;gap:8px;}
  .note-card .ico{font-family:"Chocolate Classical Sans",serif;background:var(--ink);color:var(--paper);width:30px;height:30px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto;}
  .note-card p,.note-card li{font-size:clamp(14px,3.8vw,17px);line-height:1.65;}
  .note-card ul{margin:.3em 0 0 1.1em;display:flex;flex-direction:column;gap:6px;}

  /* steps */
  .steps{counter-reset:s;display:flex;flex-direction:column;gap:12px;margin-top:6px;}
  .step{
    display:flex;gap:14px;align-items:flex-start;
    background:var(--paper2);border:2px solid var(--ink);padding:14px 16px;
    box-shadow:3px 3px 0 var(--shadow);
  }
  .step::before{
    counter-increment:s;content:counter(s);
    flex:0 0 auto;width:38px;height:38px;border-radius:50%;
    background:var(--stamp);color:#fff;font-family:"Chocolate Classical Sans",serif;
    display:flex;align-items:center;justify-content:center;font-size:20px;
    box-shadow:2px 2px 0 var(--ink);
  }
  .step .body h4{font-family:"Noto Serif TC",serif;font-size:clamp(16px,4.4vw,21px);margin-bottom:.2em;}
  .step .body p{font-size:clamp(14px,3.7vw,17px);line-height:1.6;}

  /* tip / warn boxes */
  .callout{border-left:8px solid var(--brass);background:var(--paper2);padding:14px 16px;margin-top:14px;box-shadow:3px 3px 0 var(--shadow);}
  .callout.warn{border-left-color:var(--stamp);}
  .callout h5{font-family:"Noto Serif TC",serif;font-size:clamp(15px,4vw,19px);margin-bottom:.3em;}
  .callout p{font-size:clamp(13px,3.6vw,16px);line-height:1.6;}

  /* quiz */
  .quiz{background:var(--paper2);border:3px solid var(--ink);padding:clamp(18px,5vw,30px);box-shadow:5px 5px 0 var(--shadow);max-width:720px;}
  .quiz .q{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(18px,5vw,26px);line-height:1.4;margin-bottom:1em;}
  .opts{display:flex;flex-direction:column;gap:12px;}
  .opt{
    text-align:left;font-family:inherit;font-size:clamp(15px,4vw,18px);
    padding:14px 16px;border:2px solid var(--ink);background:var(--paper);
    cursor:pointer;display:flex;gap:12px;align-items:center;
    box-shadow:3px 3px 0 var(--shadow);transition:transform .12s;
  }
  .opt:hover{transform:translate(-1px,-1px);}
  .opt:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow);}
  .opt .key{font-family:"Chocolate Classical Sans",serif;background:var(--ink);color:var(--paper);width:30px;height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .opt.correct{background:#d8e6cf;border-color:var(--leaf);}
  .opt.correct .key{background:var(--leaf);}
  .opt.wrong{background:#f0d3cf;border-color:var(--stamp);}
  .opt.wrong .key{background:var(--stamp);}
  .quiz .fb{margin-top:14px;font-size:clamp(14px,3.8vw,17px);line-height:1.6;display:none;border-top:2px dashed var(--ink);padding-top:12px;}
  .quiz .fb.show{display:block;}

  /* big number stat */
  .stat-row{display:grid;grid-template-columns:1fr;gap:14px;margin-top:8px;}
  @media(min-width:620px){.stat-row{grid-template-columns:repeat(3,1fr);}}
  .stat{background:var(--board);color:var(--chalk);border-radius:6px;padding:18px;text-align:center;box-shadow:4px 4px 0 var(--shadow);border:4px solid #6b4a2a;}
  .stat .big{font-family:"Chocolate Classical Sans",serif;font-size:clamp(30px,9vw,52px);line-height:1;color:#f3d59a;}
  .stat .lab{font-size:clamp(13px,3.6vw,16px);margin-top:8px;line-height:1.4;}

  /* hotline */
  .hotline{display:inline-flex;align-items:center;gap:10px;background:var(--stamp);color:#fff;font-family:"Chocolate Classical Sans",serif;font-size:clamp(18px,5vw,26px);padding:10px 18px;border-radius:4px;box-shadow:3px 3px 0 var(--ink);margin-top:6px;}

  /* ---------- nav ---------- */
  #nav{
    position:fixed;left:0;right:0;bottom:0;height:64px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 14px;gap:10px;
    background:linear-gradient(0deg,var(--paper) 60%,transparent);
    z-index:30;
  }
  .nbtn{
    font-family:"Chocolate Classical Sans",serif;
    background:var(--ink);color:var(--paper);border:0;
    padding:12px 18px;font-size:16px;border-radius:4px;cursor:pointer;
    box-shadow:3px 3px 0 var(--shadow);letter-spacing:1px;
    display:flex;align-items:center;gap:6px;
  }
  .nbtn:disabled{opacity:.35;}
  .nbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow);}
  #prog{
    flex:1;text-align:center;font-family:"Chocolate Classical Sans",serif;
    font-size:14px;color:var(--ink);letter-spacing:1px;
  }
  #bar{height:5px;background:var(--paper2);position:fixed;top:0;left:0;right:0;z-index:31;}
  #bar i{display:block;height:100%;background:var(--stamp);width:0;transition:width .3s;}

  /* dots menu */
  #toc-btn{position:fixed;top:12px;right:12px;z-index:32;background:var(--board);color:var(--chalk);border:0;width:46px;height:46px;border-radius:6px;font-size:20px;cursor:pointer;box-shadow:3px 3px 0 var(--shadow);}
  #toc{position:fixed;inset:0;background:rgba(35,26,20,.92);z-index:40;display:none;flex-direction:column;padding:24px 18px;overflow-y:auto;}
  #toc.on{display:flex;}
  #toc h3{color:var(--chalk);font-family:"Noto Serif TC",serif;font-size:24px;margin-bottom:16px;}
  #toc .close{align-self:flex-end;background:var(--stamp);color:#fff;border:0;width:40px;height:40px;border-radius:6px;font-size:20px;margin-bottom:8px;cursor:pointer;}
  .toc-item{text-align:left;background:transparent;color:var(--chalk);border:0;border-bottom:1px solid rgba(241,236,224,.18);padding:13px 6px;font-family:"Noto Sans TC";font-size:16px;cursor:pointer;display:flex;gap:12px;}
  .toc-item .n{font-family:"Chocolate Classical Sans",serif;color:var(--brass);min-width:30px;}
  .toc-item:active{color:var(--brass);}

  .kbd-hint{font-size:11px;color:#8a7766;text-align:center;margin-top:4px;}
  .footnote{font-size:11px;color:#8a7766;margin-top:14px;line-height:1.5;}

  /* flip reflection card */
  .flip{margin-top:14px;max-width:680px;perspective:1200px;cursor:pointer;}
  .flip-inner{position:relative;transition:transform .5s;transform-style:preserve-3d;}
  .flip.open .flip-inner{transform:rotateY(180deg);}
  @media(prefers-reduced-motion:reduce){.flip-inner{transition:none;}}
  .flip-face{border-left:8px solid var(--brass);background:var(--paper2);padding:16px 18px;box-shadow:3px 3px 0 var(--shadow);backface-visibility:hidden;-webkit-backface-visibility:hidden;}
  .flip-face.back{position:absolute;inset:0;transform:rotateY(180deg);border-left-color:var(--leaf);overflow-y:auto;}
  .flip-face h5{font-family:"Noto Serif TC",serif;font-size:clamp(15px,4vw,19px);margin-bottom:.3em;display:flex;align-items:center;gap:8px;}
  .flip-face p{font-size:clamp(13px,3.6vw,16px);line-height:1.65;}
  .flip .hint{font-size:12px;color:#8a7766;margin-top:8px;font-style:italic;}

  /* gamified body-map interactive */
  .game-intro{font-size:clamp(14px,3.8vw,17px);line-height:1.6;margin:4px 0 10px;}
  .body-game{display:grid;grid-template-columns:1fr;gap:12px;margin-top:6px;}
  @media(min-width:680px){.body-game{grid-template-columns:1fr 1fr;}}
  .bg-card{background:var(--paper2);border:2px solid var(--ink);box-shadow:4px 4px 0 var(--shadow);padding:16px;cursor:pointer;transition:transform .12s;position:relative;}
  .bg-card:hover{transform:translate(-1px,-1px);}
  .bg-card:active{transform:translate(2px,2px);}
  .bg-card .qmark{font-family:"Chocolate Classical Sans",serif;font-size:clamp(18px,5vw,24px);display:flex;align-items:center;gap:10px;}
  .bg-card .qmark .bulb{width:34px;height:34px;border-radius:50%;background:var(--brass);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:18px;}
  .bg-card .answer{display:none;margin-top:10px;border-top:2px dashed var(--ink);padding-top:10px;font-size:clamp(13px,3.6vw,16px);line-height:1.6;}
  .bg-card.revealed .answer{display:block;}
  .bg-card.revealed .qmark .bulb{background:var(--leaf);}
  .bg-card .tap{font-size:12px;color:#8a7766;margin-top:8px;font-style:italic;}
  .bg-card.revealed .tap{display:none;}

  /* role-split operation cards */
  .role-wrap{display:grid;grid-template-columns:1fr;gap:14px;margin-top:8px;}
  @media(min-width:680px){.role-wrap{grid-template-columns:1fr 1fr;}}
  .role-card{border:2px solid var(--ink);background:var(--paper2);box-shadow:4px 4px 0 var(--shadow);padding:0;overflow:hidden;}
  .role-card .role-hd{font-family:"Chocolate Classical Sans",serif;color:#fff;padding:10px 14px;font-size:clamp(15px,4.2vw,19px);letter-spacing:1px;display:flex;align-items:center;gap:8px;}
  .role-card.care .role-hd{background:var(--stamp);}
  .role-card.nurse .role-hd{background:var(--board);}
  .role-card .role-bd{padding:14px 16px;}
  .role-card ul{margin:0 0 0 1.1em;display:flex;flex-direction:column;gap:8px;}
  .role-card li{font-size:clamp(14px,3.8vw,17px);line-height:1.55;}
  .role-card li b{font-family:"Noto Serif TC",serif;}
  .op-eyebrow{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;font-family:"Chocolate Classical Sans",serif;background:var(--board);color:var(--chalk);padding:5px 14px;border-radius:2px;font-size:clamp(12px,3.4vw,15px);letter-spacing:2px;box-shadow:2px 2px 0 var(--ink);transform:rotate(-1deg);}
  .op-tag{display:inline-block;font-family:"Chocolate Classical Sans",serif;font-size:clamp(13px,3.6vw,16px);color:#fff;padding:3px 12px;border-radius:3px;margin-bottom:4px;}
  .op-tag.no{background:var(--stamp);}
  .op-tag.yes{background:var(--leaf);}

  /* download block */

}

/* 2 what is it */
{toc:"什麼是自立支援", html:`
<span class="num-chip">PART 1 — 觀念篇</span>
<h2 class="heading">什麼是「自立支援」？</h2>
<p class="lede">自立支援源自日本介護理念，2011 年引進台灣。它不是「放手不管」，而是<b>在長輩能力範圍內，協助他自己完成生活</b>，恢復自主、找回尊嚴。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">舊</span>傳統照顧</h4><p>以「效率與安全」為優先：替長輩做完所有事，怕跌倒就約束、怕沾濕就包尿布、怕麻煩就臥床。結果是<b>功能快速退化</b>。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">新</span>自立支援</h4><p>以「能力與意願」為優先：找出長輩「還能做的」，給時間、給環境、給輔具，讓他<b>用進廢退、越做越好</b>。</p></div>
</div>
<div class="callout"><h5>一句話記住</h5><p>「不是不幫，而是<b>幫他自己做</b>。」照顧者的角色，從「代勞者」變成「教練與支持者」。</p></div>`},

/* 3 why */
{toc:"為什麼要做", html:`
<span class="num-chip">PART 1 — 觀念篇</span>
<h2 class="heading">為什麼一定要做？</h2>
<p class="lede">長輩的失能，很多不是「病」造成的，是「被照顧得太好」造成的──這叫<b>廢用症候群</b>。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">退</span>對長輩</h4><ul><li>長期臥床 → 肌力流失、關節攣縮、褥瘡</li><li>包尿布 → 失禁惡化、皮膚破損、自尊受損</li><li>被約束 → 譫妄、情緒躁動、加速失智</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">省</span>對單位</h4><ul><li>長輩能自理 → 照顧負荷下降</li><li>跌倒、褥瘡、感染等併發症減少</li><li>家屬滿意度提升、機構口碑加分</li></ul></div>
</div>
<div class="callout warn"><h5>關鍵提醒</h5><p>「能力會用就在，不用就消失。」每一次「我幫你做比較快」，都是在剝奪長輩一次練習的機會。</p></div>
<div class="flip" onclick="this.classList.toggle('open')">
  <div class="flip-inner">
    <div class="flip-face front">
      <h5>🤔 換位思考</h5>
      <p>可是換個角度想──「被別人幫忙做好，當下心理感受不是比較好嗎？」這樣堅持讓長輩自己來，會不會太不近人情？</p>
      <p class="hint">點一下卡片，看看怎麼想這件事 →</p>
    </div>
    <div class="flip-face back">
      <h5>💡 短期舒服 vs 長期能力</h5>
      <p>你說得對，<b>短期確實舒服</b>──被照顧的當下是被在乎、被服務的。問題在分水嶺：當「被幫」取代了「我還做得到」，舒服會慢慢變成<b>無力、依賴與自尊流失</b>，從「我選擇被幫」變成「我不得不被幫」。</p>
      <p style="margin-top:8px">關鍵是<b>主體性</b>：幫他「想被幫的部分」（剪指甲、洗背）會增加幸福感；幫他「其實做得到的部分」卻會奪走能力感。自立支援不是冷酷地不幫，而是<b>把幫用在對的地方</b>。</p>
    </div>
  </div>
</div>`},

/* 廢用症候群研究 */
{toc:"廢用症候群：研究怎麼說", html:`
<span class="num-chip">PART 1 — 觀念篇</span>
<h2 class="heading">「躺著休養」的代價有多大？</h2>
<p class="lede">廢用症候群不是空談，國際研究都量化過。臥床不動，<b>肌肉、肌力、大腦</b>三方面會同時、而且很快地退化。</p>
<div class="stat-row">
  <div class="stat"><div class="big">~1%</div><div class="lab">年輕人完全臥床<br>每天流失肌肉量</div></div>
  <div class="stat"><div class="big">最高5%</div><div class="lab">高齡者完全臥床<br>每天可流失肌肉量</div></div>
  <div class="stat"><div class="big">~40%</div><div class="lab">短期臥床後<br>肌力可下降幅度</div></div>
</div>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">肌</span>肌力流失比肌肉更快</h4><p>研究發現臥床<b>前兩週，肌力下降速度遠快於肌肉萎縮</b>。也就是說，外觀還沒「瘦」，力氣就先沒了──臥床一兩週，原本能走的長輩可能就站不穩。抗地心引力的肌肉（坐起、站立、行走用的）退化最嚴重。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">腦</span>大腦也會退化</h4><p>住院臥床的長輩是<b>譫妄與認知退化的高風險群</b>。譫妄可影響高達五成的住院長者，且與後續長期認知下降、甚至失智風險上升有關。不動、缺乏刺激、日夜混亂，都會傷腦。</p></div>
</div>
<div class="callout warn"><h5>最驚人的數字</h5><p>有文獻指出：高齡者<b>每躺 1 天，可能需要約 2 週的復健</b>才能回到原本的功能。而超過半數臥床住院的長輩，出院一年後仍回不到入院前的行動能力。<b>「多躺一天」的代價，遠比想像的大。</b></p></div>
<p class="footnote">資料來源：國際運動生理學期刊臥床肌力與萎縮回顧（2020）；老年肌少症文獻回顧（高齡每日最高 5%、每臥床 1 天需約 2 週復健）；住院長者「不動就流失肌肉」相關研究（2023）；國際譫妄與認知相關文獻。數據為研究情境下結果，個別差異大。</p>`},

/* 4b experiential game: disuse */
{toc:"體驗｜用進廢退", html:`
<span class="eyebrow">小體驗・動手玩</span>
<h2 class="heading">「不用，它就退化給你看」</h2>
<p class="game-intro">先玩個 30 秒小實驗，親身感受「廢用」。每張卡片<b>先猜猜看</b>，再點開答案 👇</p>
<div class="body-game">
  <div class="bg-card" onclick="this.classList.toggle('revealed')">
    <div class="qmark"><span class="bulb">①</span><span>把慣用手反過來，用<b>非慣用手</b>寫下自己的名字。</span></div>
    <div class="answer">歪歪扭扭、很慢對吧？這隻手肌肉、神經都在，只是<b>平常很少用來寫字</b>，技能就「生鏽」了。長輩的吃飯、穿衣、走路，道理一模一樣──不是不能，是太久沒用。</div>
    <div class="tap">▸ 試完點我看解答</div>
  </div>
  <div class="bg-card" onclick="this.classList.toggle('revealed')">
    <div class="qmark"><span class="bulb">②</span><span>脫掉鞋襪，腳掌平貼地板，試著把<b>大腳趾根部（腳掌前緣）往腳跟方向拉、讓足弓微微拱起</b>，腳趾保持放鬆平貼──做得出來嗎？</span></div>
    <div class="answer"><b>注意：不是把腳趾頭彎起來抓地！</b>這個動作叫「縮足運動（Short-Foot）」，靠的是腳掌裡的小肌肉把足弓撐起來，腳趾要保持放鬆、平貼。很多人一試就發現「找不到那塊肌肉」、只會把腳趾蜷起來代償──正是因為平常都靠鞋子撐、太久沒用，這條控制足弓的能力就「忘記」了。足底小肌肉一退化，足弓塌、平衡變差、走路更容易累、更容易跌。一起慢慢找回這個動作 👇</div>
    <div class="tap">▸ 試完點我看解答</div>
  </div>
</div>
<div class="callout warn"><h5>兩個最常被「用廢」的部位</h5><p><b>1. 足底與下肢小肌肉：</b>長年穿鞋、久坐久臥，控制足弓的足底小肌肉與大腿股四頭肌一起退化，足弓塌、站立平衡變差，從「能扶著走」變「站不起來」。剛剛的縮足運動，就是在喚醒這群被遺忘的小肌肉。<br><b>2. 吞嚥肌肉：</b>長期管灌、不用嘴巴吃，咀嚼與吞嚥的肌肉協調退化，之後想恢復由口進食就更難。<b>能力是用進廢退──生活裡的每一個動作，都是最好的「復健器材」。</b></p></div>`},

/* 6b evidence: three regions */
{toc:"實證｜三地研究", html:`
<span class="num-chip">PART 1 — 觀念篇</span>
<h2 class="heading">這不只是理念，有實證</h2>
<p class="game-intro">日本、台灣、歐美都有研究與實作數據，支持「減約束、促自立」的方向。</p>
<div class="cards">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">日</span>日本・源頭</h4><p>竹內孝仁教授提出自立支援，核心是<b>水分、營養、運動、排便</b>四大照顧。介護保險自 2000 年起<b>原則禁止身體約束</b>。但約束並未完全消失──近年調查顯示特養約 1/4、老健約 1/3 仍存在某種約束，顯示「制度先行，現場仍需持續推動」。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">台</span>台灣・多方推動</h4><p><b>林金立</b>（雲林長泰老學堂／同仁仁愛之家）2011 年從日本引進、2014 年導入 ZIZIBABA 體驗訓練，代表機構導入後<b>約束率由 40% 降到 0%</b>、照服員離職率從 3 成降到 8%。<b>護理界的雷若莉老師</b>（暨南大學護理系教授）則從護理教育與學術深耕生活自立支援與零約束。一實作、一學術，共同推起台灣的「照顧革命」，「零約束」已納入官方長照目標。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">歐</span>歐美・嚴謹研究</h4><p>德國多家機構合作的<b>大型對照研究</b>證實：以教育＋輔具（髖部護具、離床感應墊）為核心的多元方案，能<b>明顯降低約束使用，而且沒有增加跌倒與骨折</b>。歐美「復能照顧」的研究也顯示，能改善長輩的日常生活功能、減少後續的照顧需求與花費。</p></div>
</div>
<div class="callout"><h5>「髖部護具、感應墊」是什麼？</h5><p><b>髖部護具（hip protector）：</b>像一件內搭褲／腰帶，兩側髖部口袋內各有一片護墊，萬一跌倒時吸收衝擊、保護髖骨，<b>降低髖部骨折</b>──讓人「敢放手讓長輩走」而不必綁住。<br><b>感應墊（離床感應墊）：</b>鋪在床邊或椅上的薄墊，長輩一離開、重量改變就<b>發出警示通知照顧者</b>，及時過去協助，用「即時知道」取代「綁著不准動」。</p></div>
<p class="footnote">資料來源：竹內孝仁自立支援理念；台灣報導與機構公開資料（林金立／同仁仁愛之家）；德國 Köpke 等人的對照研究與國際文獻回顧。數據為各研究情境下結果，非保證值。</p>`},

/* 6c evidence: key factors */
{toc:"實證｜執行關鍵", html:`
<span class="num-chip">PART 1 — 觀念篇</span>
<h2 class="heading">實證歸納的 5 個執行關鍵</h2>
<p class="game-intro">把三地研究的共同點抓出來──成功不靠口號，靠這五件事到位。</p>
<div class="steps">
  <div class="step"><div class="body"><h4>觀念先翻轉，不只給技術</h4><p>歐美的嚴謹研究與台灣經驗都指出：<b>教育＋體驗</b>（如照顧者親身被約束）改變的是信念。沒有觀念轉變，再多技巧都會打折。</p></div></div>
  <div class="step"><div class="body"><h4>管理者與全組織承諾</h4><p>日本手引強調，從<b>管理者到全機構</b>都要認知約束有害、共同擔責。零約束是團隊決策，不是照服員一個人的事。</p></div></div>
  <div class="step"><div class="body"><h4>提供替代方案與輔具</h4><p>有效方案都<b>不是只叫人「別綁」</b>，而是給工具：降床、感應墊、髖部護具、個別化問題解決，滿足長輩需求取代約束。</p></div></div>
  <div class="step"><div class="body"><h4>個別化目標與計畫</h4><p>復能研究核心是<b>與長輩共同設定目標</b>的個別化計畫（ISP，即為每位長輩量身訂做的支持計畫）。目標來自長輩本人，參與度與成效才會高。</p></div></div>
  <div class="step"><div class="body"><h4>基本照顧扎實＋數據追蹤</h4><p>回到四要：<b>喝水、營養、活動、排便</b>顧好是地基；再用巴氏量表等定期記錄，讓成效可見、可持續、可說服家屬。</p></div></div>
</div>`},

/* 自立支援研究補充 */
{toc:"實證｜更多研究", html:`
<span class="num-chip">PART 1 — 觀念篇</span>
<h2 class="heading">自立支援，研究還說了什麼</h2>
<p class="lede">除了「約束率降到 0」這類機構成果，更多研究指向自立支援背後的科學基礎。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">能</span>失能者並非無能</h4><p>實證研究指出，<b>失能長者並不如想像中無助消極</b>。即使身體受限，許多人仍保有自我效能，能發展自助互助策略。提升自我效能最有效的方式，是讓他累積「<b>我做得到</b>」的精熟經驗──這正是自立支援的核心。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">復</span>復能成效可量化</h4><p>彰化等地的復能計畫顯示：由治療師評估、照服員每日帶領訓練並記錄，<b>連 90 歲長者的手部功能、抓握、平衡都能明顯改善</b>，跌倒風險下降。證明「即使重度高齡，也有復能潛力」。</p></div>
</div>
<div class="callout"><h5>評估要多面向</h5><p>專家提醒：巴氏量表雖是日常功能評估的共同語言，但<b>只代表單一面向</b>，應搭配認知、意願、生活角色等多面向評估，才能真正貼近每位長輩。修正版巴氏量表（五點計分）敏感度更高，值得搭配使用。</p></div>
<p class="footnote">資料來源：科技部自我效能量表研究；台灣科技媒體中心巴氏量表專家意見；公視獨立特派員彰化復能報導（2026）。</p>`},

/* 3b FAQ: scope, evaluation */
{toc:"常見提問", html:`
<span class="num-chip">PART 1 — 觀念篇</span>
<h2 class="heading">大家最常問的三個問題</h2>
<div class="cards">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">比</span>有多少機構在做？</h4><p>目前<b>沒有官方公布的普及率數字</b>，看到精確百分比要存疑。確定的是政策方向：衛福部 113–116 年「住宿機構照顧品質獎勵計畫」已把<b>個別化支持計畫（ISP）、人員專業知能、住民權益</b>列為獎勵指標，住宿機構與護理之家逐年增加導入，但尚未全面普及。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">域</span>只適合機構嗎？</h4><p>不是。機構、社區、居家<b>都適用</b>，原則一樣。其實居家與社區是長輩熟悉的生活場域，動機更自然、有時更好落地；機構的挑戰反而在團體人力與風險管理的平衡。差別在「怎麼做」，不在「能不能做」。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">評</span>評鑑會看嗎？看多深？</h4><p>會，但多半<b>不是獨立一條</b>，而是融在「專業照護品質、個案權益保障、服務改進創新」等大項裡。委員實際會查：<b>約束的評估與替代措施記錄、有無個別化照顧計畫並定期檢討、離床活動與功能維持成效</b>。屬於「會被翻記錄、會被問、會影響評等」的層級。細項以你單位該年度適用的評鑑指標原文為準。</p></div>
</div>`},

/* 三不是系統管理問題 */
{toc:"三不｜是管理問題", html:`
<span class="num-chip">PART 2 — 原則篇</span>
<h2 class="heading">「三不」不是叫照服員別做就好</h2>
<p class="lede">很多人以為三不（不約束、不臥床、不尿布）是第一線照服員的事。但真相是：<b>三不大多是觀念與制度問題，要由上到下一起改，否則推不動。</b></p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">難</span>為什麼第一線推不動？</h4><ul><li>怕跌倒、怕被家屬告 → <b>風險沒人一起扛</b></li><li>人力不足 → 沒時間定時如廁、陪走</li><li>「以前都這樣做」的慣性</li><li>照服員一個人扛不起零約束的決策</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">管</span>要由上到下的管理</h4><ul><li><b>管理者表態：</b>把三不訂為機構政策與目標</li><li><b>共同擔責：</b>跌倒風險由團隊＋家屬共同決策</li><li><b>調整人力與流程：</b>讓定時如廁、離床做得到</li><li><b>教育與考核：</b>把替代約束、離床成效納入</li></ul></div>
</div>
<div class="callout warn"><h5>關鍵認知</h5><p>日本與台灣的成功經驗一致指出：零約束、零臥床能成功，靠的是<b>「全機構從院長到照服員的共識」</b>，不是某個認真照服員的單打獨鬥。沒有制度撐腰，第一線越想做對、越容易受傷、越容易放棄。</p></div>`},

/* 台灣約束現況 */
{toc:"台灣約束現況", html:`
<span class="num-chip">PART 2 — 原則篇</span>
<h2 class="heading">台灣的約束，比你以為的多</h2>
<p class="lede">「約束」在台灣機構其實相當普遍。研究數據讓我們看清現況──這正是自立支援要努力的起點。</p>
<div class="stat-row">
  <div class="stat"><div class="big">62–74%</div><div class="lab">台灣機構住民<br>曾被身體約束<br>（多篇研究）</div></div>
  <div class="stat"><div class="big">30.2%</div><div class="lab">全國 266 家機構調查<br>曾被約束比例<br>（2019–2020）</div></div>
  <div class="stat"><div class="big">2大主因</div><div class="lab">防跌倒<br>＋防自拔管路</div></div>
</div>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">具</span>常見約束方式／部位</h4><ul><li><b>約束帶：</b>綁手腕、軀幹、固定在床或輪椅</li><li><b>約束背心／約束衣</b></li><li><b>約束手套</b>（防自拔管路）</li><li><b>餐桌板</b>限制起身</li><li>（床欄、藥物約束另計）</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">誰</span>誰最容易被約束？</h4><ul><li>巴氏量表分數低、<b>依賴程度高</b>者</li><li>認知功能差、<b>失智、有 BPSD</b>者</li><li>有特殊護理（鼻胃管、抽痰、導尿）者</li><li>家屬／社工<b>簽了同意書</b>的</li></ul></div>
</div>
<div class="callout warn"><h5>數字背後的真相</h5><p>研究一再證實：<b>約束並不能真正防止跌倒</b>，反而增加肌肉萎縮、功能退化、譫妄與受傷。國際視約束為一種對長者的傷害。台灣機構約束率仍偏高，<b>降約束的空間與必要性都很大</b>。</p></div>
<p class="footnote">資料來源：台灣多篇機構約束率研究（約 62–74%）；2019–2020 全國 266 家機構、5,752 人調查（30.2% 曾被約束，主因防跌與防拔管）。不同研究定義與對象不同，數字有差異。</p>`},

/* 臥床久坐比例 */
{toc:"長者一天躺多久", html:`
<span class="num-chip">PART 2 — 原則篇</span>
<h2 class="heading">綁起來、躺著，長輩一天躺多久？</h2>
<p class="lede">約束的另一面，是長輩「不動」的時間遠比我們想像的長。動得越少，越快退化──這正是要「把長輩請下床、請起身」的理由。</p>
<div class="stat-row">
  <div class="stat"><div class="big">10 小時+</div><div class="lab">65 歲以上長者<br>醒著時可能有 10 小時以上<br>都坐著或躺著</div></div>
  <div class="stat"><div class="big">72%</div><div class="lab">住機構的失智長輩<br>一天約 7 成時間<br>處於久坐／臥床狀態</div></div>
  <div class="stat"><div class="big">66%</div><div class="lab">住社區的失智長輩<br>久坐／臥床比例較低<br>（環境會影響活動量）</div></div>
</div>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">看</span>數字告訴我們什麼</h4><ul><li>失智長輩一天<b>最有活力的時段，是早上剛下床那一刻</b>──之後活動量就一路下滑。</li><li>住機構的長輩，久坐／臥床比例比住在社區的還高，<b>環境與安排，決定了長輩動或不動</b>。</li><li>能下床、能起身的長輩，常常「被好意地」留在床上、椅上。</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">動</span>所以我們可以做的</h4><ul><li>把握<b>早上下床後的黃金時段</b>安排活動。</li><li>多一次「請長輩自己走到餐廳、廁所」，就少一段臥床時間。</li><li>用「離床、起身、走幾步」取代「綁著不准動」──<b>降約束與多活動是一體兩面</b>。</li></ul></div>
</div>
<div class="callout warn"><h5>提醒</h5><p>坊間常說「國人臨終前臥床好幾年」，其實多數是「<b>從一點點不方便、到完全臥床</b>」的長期失能過程，並非真的整段時間都躺在床上。重點不在嚇人的數字，而在：<b>每一次讓長輩自己動，都是在把臥床的那一天往後推。</b></p></div>
<p class="footnote">資料來源：國健署與千禧之愛健康基金會久坐調查（65 歲以上長者醒時常逾 10 小時久坐或臥床）；失智長者活動量研究（住機構約 72%、住社區約 66% 時間久坐／臥床，活動高峰在晨起下床後）；陳亮恭醫師對「臨終臥床年數」的說明。數字因研究對象與定義不同而有差異。</p>`},

/* 5 four-yes are the engine */
{toc:"四要是引擎", html:`
<span class="num-chip">PART 2 — 原則篇</span>
<h2 class="heading">「四要」是讓三不成真的引擎</h2>
<p class="lede">很多人只記得「三不」，卻忘了三不要能達成，靠的是「四要」這四個基本生活循環。</p>
<div class="stat-row">
  <div class="stat"><div class="big">水</div><div class="lab">喝足水 → 不脫水、不譫妄、排便順</div></div>
  <div class="stat"><div class="big">食</div><div class="lab">吃得夠 → 有體力、有肌肉、能活動</div></div>
  <div class="stat"><div class="big">動</div><div class="lab">常活動 → 腸蠕動好、肌力在、能離床</div></div>
</div>
<div class="callout"><h5>循環邏輯</h5><p>喝水＋進食＋運動 → 排便正常 → 腸胃舒服、食慾好 → 更有體力活動 → 能離床、能如廁 → <b>自然就不臥床、不尿布、不需約束</b>。四要顧好，三不水到渠成。</p></div>
<p class="footnote">註：竹內孝仁原始「四大照顧」量化建議為每日飲水約 1500cc、熱量約 1500 大卡、規律步行活動、每 1–3 天排便一次。本講義熱量改採「均衡營養」表述，因每日熱量需求須依體型、活動量與疾病個別調整，不宜給單一固定值。</p>`},

/* 6 assessment */
{toc:"評估工具", html:`
<span class="num-chip">PART 2 — 原則篇</span>
<h2 class="heading">先評估，再支援</h2>
<p class="lede">自立支援不是憑感覺，要先看清長輩「現在能做到哪裡」，才知道從哪裡開始幫。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">表</span>巴氏量表 ADLs</h4><p>評估十項日常生活功能：進食、移位、如廁、洗澡、平地走動、穿脫衣褲等。用來掌握獨立程度，並比較介入前後的進展。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">ICF</span>能力與環境</h4><p>不只看「失能」，也看長輩的<b>意願、習慣、生活角色與環境</b>。同樣坐輪椅，有人能自推、有人不能，支援策略要量身訂做。</p></div>
</div>
<div class="callout"><h5>但巴氏量表夠用嗎？</h5><p>巴氏量表是長照的通用語言、適合掌握大方向，<b>但它看不出細微進步</b>。下面三頁專門談：它的盲點在哪、怎麼讓進步真的被看見、以及你和單位該怎麼跨出第一步。</p></div>`},

/* 6a-1 Barthel blind spots */
{toc:"巴氏量表的盲點", html:`
<span class="num-chip">PART 2 — 原則篇</span>
<h2 class="heading">巴氏量表，真的看得出進步嗎？</h2>
<p class="lede">你的直覺沒錯──它常常「看不出」長輩的進步。原因有三個結構性盲點：</p>
<div class="cards">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">粗</span>級距太粗</h4><p>每項只有 0／5／10 分。長輩從「完全要餵」進步到「能自己舀、但會掉、需旁邊盯」，分數常常<b>完全沒動</b>──真實進步發生在級距「之內」，量表抓不到。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">頂</span>天花板／地板效應</h4><p>能力好的一開始就接近滿分，再進步也升不上去；退到底的（如長年 0 分）再差也降不下去。<b>最需要被看見變化的兩端，反而最不敏感</b>。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">用</span>本來就不是為「追蹤進步」設計</h4><p>它在台灣主要是<b>資格審查的行政工具</b>（長照、外籍看護、保險理賠的門檻認定），代表單一面向，專家也建議須搭配多面向評估才完整。</p></div>
</div>
<p class="footnote">參考：台灣科技媒體中心專家意見──巴氏量表代表日常生活功能單一面向，已有五點計分修正版可提高敏感度但尚未普及。</p>`},

/* 6a-2 make progress visible */
{toc:"讓進步被看見", html:`
<span class="num-chip">PART 2 — 原則篇</span>
<h2 class="heading">那要怎麼讓進步被看見？</h2>
<p class="lede">關鍵：別只靠一張總分表，改用<b>多軌、具體、可量化的日常數據</b>。</p>
<div class="steps">
  <div class="step"><div class="body"><h4>把能力拆成「可以數」的指標</h4><p>不要寫「進食有進步」，要寫<b>自己吃完比例 3 成→7 成、一餐時間 50 分→35 分、嗆咳每餐 3 次→0 次</b>。飲水記 cc、走路記公尺／步數、如廁記成功佔比、離床記時數。級距細，幾天就看得到動。</p></div></div>
  <div class="step"><div class="body"><h4>用照片／影片做前後對照</h4><p>第一週站不起來、一個月後扶著走的影片<b>並排播放</b>，比任何分數都有說服力──對家屬尤其有力。</p></div></div>
  <div class="step"><div class="body"><h4>巴氏量表當「季度體檢」，不是進步指尺</h4><p>它適合每季看大趨勢、應付評鑑與資格；日常的激勵與調整，靠上面那些細指標。</p></div></div>
  <div class="step"><div class="body"><h4>想要更敏感，可以再加</h4><p><b>修正版巴氏量表</b>（五點計分）、<b>ICF</b>（看意願與生活角色）、或<b>功能性目標達成記錄</b>（追蹤長輩自己設的目標達成到哪）。</p></div></div>
</div>
<div class="dl-block">
  <h4>📋 現成記錄表，印出來就能用</h4>
  <p>我們把上面說的「可以數的指標」做成五張 A4 記錄表，適合印出來手寫：</p>
  <div class="dl-list">
    <div>① 飲水記錄表（每日分時段記 cc、自動對照目標）</div>
    <div>② 排便記錄表（含布里斯托大便分型 1–7）</div>
    <div>③ 離床／活動記錄表（離床時數、活動內容）</div>
    <div>④ 如廁／排尿記錄表（定時引導、找排尿規律）</div>
    <div>⑤ 功能性目標達成記錄表（每週評分、看見小進步）</div>
  </div>
  <a class="dl-btn" href="#" onclick="downloadForms(event)">⬇ 下載五張記錄表 PDF</a>
</div>`},

/* 6a-3 first step */
{toc:"第一步怎麼開始", html:`
<span class="num-chip">PART 2 — 原則篇</span>
<h2 class="heading">第一步：怎麼開始？</h2>
<p class="game-intro">照顧者個人與單位的起手式不一樣──都從「小」開始，不要一次改全部。</p>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">👤 對專業照顧者（你自己）</div><div class="role-bd"><ul>
    <li><b>挑一位長輩、一個動作、一個指標</b>，記錄兩週。例：王奶奶「自己吃飯比例」，每餐記一個數字。</li>
    <li>兩週後你會有<b>一條曲線</b>──它同時證明方法有效、說服你自己、成為跟護理師與家屬溝通的籌碼。</li>
    <li><b>不要一次改全部</b>，從一個人、一件事開始，成功了再加第二件。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🏠 對單位</div><div class="role-bd"><ul>
    <li><b>先建立會議室的共識：</b>管理者與護理長認同方向、願意一起承擔風險（觀念翻轉是成功前提）。</li>
    <li><b>選一位長輩做試點：</b>全團隊＋家屬共同設定一個具體目標，約定替代措施與記錄方式。</li>
    <li><b>先做出一個成功故事：</b>用數據＋影片對內分享，再逐步擴大。<b>一個贏的案例，比全院硬推更走得遠。</b></li>
  </ul></div></div>
</div>
<div class="callout"><h5>一句話起步</h5><p>個人：<b>一人、一事、兩週、一條曲線。</b>　單位：<b>先共識、做試點、講一個成功故事。</b></p></div>`},

/* 7 QUIZ 1 */
{toc:"隨堂測驗 ①", quiz:1, html:`
<span class="eyebrow">隨堂測驗 ①</span>
<h2 class="heading">想一想</h2>
<div class="quiz" data-answer="1">
  <div class="q">王奶奶能自己吃飯，但吃得慢、會掉飯粒。最符合自立支援的做法是？</div>

    <button class="opt" data-i="0"><span class="key">A</span><span>為了乾淨又快，直接餵她吃完。</span></button>

    <button class="opt" data-i="2"><span class="key">C</span><span>怕她嗆到，改全部打成流質由管灌。</span></button>
  </div>
  <div class="fb"></div>
</div>`},

/* 8 practice: water */
{toc:"實務｜飲水", html:`
<span class="num-chip">PART 3 — 實務篇</span>
<h2 class="heading">飲水：每天 1500cc 怎麼達標</h2>
<div class="steps">
  <div class="step"><div class="body"><h4>分次給、別硬灌</h4><p>把一天水量拆成多個時段（如每小時 100–150cc），搭配三餐、服藥、活動後給水。</p></div></div>
  <div class="step"><div class="body"><h4>找出他愛喝的</h4><p>不愛白開水？可用無糖茶、湯品、果汁、果凍、含水量高的水果替代部分水分。</p></div></div>
  <div class="step"><div class="body"><h4>吞嚥困難要增稠</h4><p>容易嗆咳者，依評估使用增稠劑調整稠度，坐正、小口喝，喝完維持坐姿一段時間。</p></div></div>
</div>
<div class="callout warn"><h5>注意</h5><p>心臟衰竭、腎功能不全或限水醫囑者，水量須遵醫囑，不可一律 1500cc。觀察尿量與尿色（深黃＝可能水分不足）。</p></div>`},

/* 9 practice: eating */
{toc:"實務｜進食", html:`
<span class="num-chip">PART 3 — 實務篇</span>
<h2 class="heading">進食：盡量讓他自己吃</h2>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">姿</span>姿勢先到位</h4><ul><li>坐起 90 度、雙腳踏地或踏板</li><li>頭微前傾（下巴微收），降低嗆咳</li><li>能離床到餐桌就不在床上吃</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">具</span>輔具幫大忙</h4><ul><li>防滑墊、加高邊餐盤、粗柄／彎柄餐具</li><li>雙耳杯、附吸管杯方便握取</li><li>食物質地依吞嚥能力分級調整</li></ul></div>
</div>
<div class="callout"><h5>陪吃技巧</h5><p>把餐盤放在他主動手側、食物在視線內；他做得到的部分絕不代勞，卡關的步驟才出手（如協助舀第一口、固定碗）。一餐約抓 30–45 分鐘，不催促。</p></div>`},

/* 11 practice: toileting */
{toc:"實務｜如廁", html:`
<span class="num-chip">PART 3 — 實務篇</span>
<h2 class="heading">如廁：定時引導，告別尿布</h2>
<p class="lede">「不尿布」不是說拔掉就好，而是建立<b>定時如廁</b>的節奏，讓長輩重新掌握排泄。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">時</span>記錄與定時</h4><ul><li>先記錄 2–3 天的排泄時間，找出規律</li><li>依規律＋餐後反射，定時帶他上廁所</li><li>夜間可用尿壺、便盆椅過渡</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">境</span>環境要友善</h4><ul><li>動線清楚、扶手穩固、地面防滑</li><li>衣著好穿脫（鬆緊帶、魔鬼氈）</li><li>給足時間與隱私，不催促、不責備</li></ul></div>
</div>
<div class="callout"><h5>心態提醒</h5><p>過程一定會有「失敗」。一次失禁不代表方法錯了，調整時間表再來。維護長輩尊嚴，比一塊乾爽的尿布更重要。</p></div>`},

/* 12 practice: activity / no-restraint */
{toc:"實務｜活動與零約束", html:`
<span class="num-chip">PART 3 — 實務篇</span>
<h2 class="heading">活動與零約束</h2>
<p class="lede">約束常源於「怕跌倒、怕拔管」。但約束本身會帶來更多傷害──我們要找的是<b>替代方案</b>，不是綁起來。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">動</span>讓他每天動</h4><ul><li>白天離床坐起、扶著走、做簡單運動</li><li>安排有意義的活動：摺毛巾、澆花、唱歌</li><li>動起來 → 累了好睡、躁動減少</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">替</span>約束的替代</h4><ul><li>降低床高、加防跌地墊、感應警示</li><li>滿足需求（口渴、想如廁、無聊）</li><li>管路固定改良、轉移注意力</li></ul></div>
</div>
<div class="callout warn"><h5>團隊共識</h5><p>零約束要全單位＋家屬一起承擔風險、共同決策。記錄替代措施與評估，這既是安全保障，也是專業展現。</p></div>`},

/* ===== exercise: functional movement ===== */

/* functional movement intro */
{toc:"運動｜功能性運動", html:`
<span class="num-chip">PART 3 — 實務篇</span>
<h2 class="heading">關鍵不是運動，是「功能性運動」</h2>
<p class="lede">自立支援的運動，不追求把長輩練成運動員，而是練「<b>生活用得到的動作</b>」。竹內孝仁特別強調<b>步行</b>──走路會啟動站立大腸反射促進排便、改善意識清醒度，連帶幫助排泄與吞嚥訓練。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">問</span>什麼是功能性運動？</h4><p>把訓練<b>綁進真實生活動作</b>：練的不是「抬腿 10 下」，而是「能自己站起來、走到廁所、從椅子坐下站起」。動作本身就是生活技能，練了馬上用得到。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">比</span>和一般運動差在哪</h4><p>一般運動練單一肌群；功能性運動練<b>多關節、多肌群的協調</b>，貼近起身、轉位、行走、彎腰拿物等日常。對長輩來說，這才是「維持自理」的關鍵。</p></div>
</div>
<div class="callout"><h5>三個層次，循序漸進</h5><p>依長輩能力，從<b>床上 → 輪椅（坐姿）→ 站姿與步行</b>逐步進階。臥床的先練坐起，能坐穩的練站，能站的練走。下面兩頁是各層次可直接帶長輩做的動作。</p></div>
<p class="footnote">註：所有運動皆須先由護理師／物理治療師評估安全與禁忌（心肺、骨折、傷口等），照服員依評估帶領並觀察反應。</p>`},

/* bed + wheelchair exercises */
{toc:"運動｜床上・輪椅", html:`
<span class="num-chip">PART 3 — 實務篇</span>
<h2 class="heading">床上 & 輪椅（坐姿）運動</h2>
<p class="lede">承上一頁的<b>功能性運動</b>原則：能做生活動作（坐起、轉位、站、走）最好。但臥床或剛起步的長輩還做不到時，先用下面的基礎動作<b>維持關節、肌力與循環</b>──<b>能動，總比不動好</b>，這些動作正是日後練坐、練站、練走的本錢。</p>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">🛏 床上運動（臥床／剛起步）</div><div class="role-bd"><ul>
    <li><b>踝泵運動：</b>腳板上下勾、繞圈，促進血循、防血栓。</li>
    <li><b>抬臀橋式：</b>屈膝、臀部抬離床面，練核心與下肢，是坐起的基礎。</li>
    <li><b>翻身練習：</b>引導側躺、手撐床面，為自己坐起鋪路。</li>
    <li><b>坐起訓練：</b>先搖高床頭降低難度，側躺用手肘撐起 → 逐步自己坐穩。</li>
    <li><b>關節活動：</b>四肢各關節緩慢全範圍活動，防攣縮。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">♿ 輪椅／坐姿運動</div><div class="role-bd"><ul>
    <li><b>坐姿抬腿：</b>輪流屈膝抬腳，練大腿肌耐力。</li>
    <li><b>原地踏步（坐）：</b>坐穩雙腳輪流踏，模擬走路。</li>
    <li><b>舉水瓶：</b>手握小水瓶舉到肩高，練上肢。</li>
    <li><b>扭毛巾：</b>緩慢用力扭毛巾，練握力與前臂。</li>
    <li><b>雙手畫圈：</b>握拳同時畫圈，模擬推輪椅、增進自行移動能力。</li>
  </ul></div></div>
</div>
<div class="callout warn"><h5>安全提醒＋小訣竅</h5><p>坐姿運動務必先<b>固定輪椅煞車、雙腳踏地或踏板</b>。臥床長輩起身放慢、注意姿勢性低血壓。每個動作量力而為，會喘或不適即停並回報。<b>盡量把動作接回生活</b>：原地踏步接到「站起來走幾步」、坐姿抬腿接到「自己挪到餐桌」，讓基礎動作一步步變回真正用得到的功能。</p></div>`},

/* standing + walking exercises */
{toc:"運動｜站姿・步行", html:`
<span class="num-chip">PART 3 — 實務篇</span>
<h2 class="heading">站姿 & 步行運動</h2>
<p class="lede">能站、能走，是自立支援的<b>最高目標</b>──它直接關係到能不能自己上廁所、離床、過生活。</p>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">🧍 站姿運動（扶穩進行）</div><div class="role-bd"><ul>
    <li><b>起立坐下：</b>坐穩固有扶手椅，踩地站起維持 1 秒再坐下──最重要的功能性動作。</li>
    <li><b>扶站練習：</b>扶穩桌／扶手站立，逐步延長站立時間。</li>
    <li><b>提踵：</b>扶穩後腳跟提起、放下，練小腿與平衡。</li>
    <li><b>單腳微抬平衡：</b>扶穩單腳輕抬離地數秒，練平衡防跌。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🚶 步行運動（核心目標）</div><div class="role-bd"><ul>
    <li><b>扶著走：</b>用助行器或扶手，從幾步開始慢慢增加。</li>
    <li><b>生活動線當路線：</b>走到餐桌、廁所，把步行融入日常。</li>
    <li><b>對話速度：</b>能邊走邊講話、略費力為適當強度。</li>
    <li><b>記距離：</b>記錄步數或距離，讓進步看得見。</li>
  </ul></div></div>
</div>
<div class="callout"><h5>為什麼步行最關鍵</h5><p>步行能改善排便（站立大腸反射）、提升意識清醒度，進而幫助排泄訓練與吞嚥訓練。<b>能走，幾乎整個自立支援循環都被帶動起來。</b></p></div>`},

/* ===== PART 4: role-split operations for 三不四要 ===== */

/* OP intro */
{toc:"角色分工｜總說", html:`
<span class="op-eyebrow">PART 4・角色分工操作</span>
<h2 class="heading">同一件事，兩個角色怎麼分工</h2>
<p class="lede">接下來把「三不四要」七項逐一拆解。每一項都分兩塊：<b>照服員</b>負責第一線執行與觀察，<b>護理師</b>負責評估、把關與處置決策。<br><span class="muted">在社區或居家，「執行與觀察」可能由家屬或照顧者擔任，「評估與把關」則由到宅的護理師、治療師或個管師協助──角色名稱不同，分工邏輯一樣。</span></p>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">👐 照服員 ─ 做與看</div><div class="role-bd"><ul><li><b>執行</b>日常照顧動作、引導長輩自己做</li><li><b>觀察</b>並記錄狀況（量、次數、反應）</li><li>發現異常<b>即時回報</b>護理師</li></ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🩺 護理師 ─ 評與管</div><div class="role-bd"><ul><li><b>評估</b>能力、風險與禁忌（含醫囑）</li><li>訂定<b>個別化計畫</b>與目標、調整策略</li><li>處理<b>醫療判斷</b>：用藥、傷口、異常處置</li></ul></div></div>
</div>
<p class="footnote">以下角色分工為一般原則，實際職責劃分仍依各單位規範、人員證照與醫囑授權範圍為準。</p>`},

/* 不約束 */
{toc:"不約束｜操作", html:`
<div style="margin-bottom:.3em"><span class="op-tag no">三不・不約束</span></div>
<h2 class="heading">「不約束」這樣做</h2>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">👐 照服員怎麼做</div><div class="role-bd"><ul>
    <li><b>先找原因：</b>長輩想拔管、想下床，多半是癢、痛、想如廁、無聊。先解決需求，而非綁住。</li>
    <li><b>環境替代：</b>降低床高、鋪防跌地墊、加裝離床感應墊／鈴，巡視頻率提高。</li>
    <li><b>管路友善：</b>固定確實、用衣物或束腹巧妙遮蓋，減少他注意到管路。</li>
    <li><b>陪伴轉移：</b>安排活動、給東西握（毛巾、布球），轉移想拔扯的注意力。</li>
    <li><b>記錄回報：</b>記下何時躁動、做了什麼替代、效果如何。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🩺 護理師把關什麼</div><div class="role-bd"><ul>
    <li><b>評估必要性：</b>確認是否真有立即危險，找出躁動的醫療原因（疼痛、譫妄、感染、缺氧）。</li>
    <li><b>處置根因：</b>調整管路、處理疼痛與不適，必要時檢視用藥。</li>
    <li><b>替代決策：</b>與團隊、家屬共同訂替代方案並簽署、記錄評估。</li>
    <li><b>持續再評：</b>定期檢討，避免「以防萬一」的習慣性約束。</li>
  </ul></div></div>
</div>`},

/* 人性化約束與骨盆帶 */
{toc:"人性化約束與尊嚴", html:`
<span class="num-chip">PART 4 — 操作篇</span>
<h2 class="heading">真的需要時，也要有尊嚴</h2>
<p class="lede">零約束是目標，但少數情況下（如評估後仍有立即危險）真的需要支撐固定時，<b>怎麼做才不傷害長輩的尊嚴</b>，同樣是專業。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">帶</span>骨盆帶 ≠ 約束帶</h4><p><b>骨盆帶（擺位帶）</b>是斜向 45 度固定在<b>髂前上棘下方</b>、拉住骨盆的擺位輔具，目的是<b>讓長輩坐得正、坐得穩、不往前滑</b>，反而能更安全地自己活動。它和把人「綁住限制行動」的約束帶，本質完全不同。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">尊</span>有尊嚴的做法</h4><ul><li>先說明、取得長輩與家屬<b>同意</b></li><li>選<b>最小限制</b>的方式，能擺位就不約束</li><li>用衣物、坐墊巧妙融入，<b>不暴露於眾人面前</b></li><li>定時解開、活動、如廁，不是一綁了事</li><li>完整記錄、定期再評估是否還需要</li></ul></div>
</div>
<div class="callout warn"><h5>關鍵分界</h5><p>同樣是固定，<b>「為了限制他」和「為了支持他坐穩去做事」是兩回事</b>。前者是約束，後者是擺位。永遠先問：這個固定，是方便我們，還是真的對長輩好？</p></div>
<p class="footnote">註：任何身體固定都須經專業評估、符合最小限制原則並完整記錄。骨盆帶的使用與調整應由治療師或護理師指導。</p>`},

/* 不臥床 */
{toc:"不臥床｜操作", html:`
<div style="margin-bottom:.3em"><span class="op-tag no">三不・不臥床</span></div>
<h2 class="heading">「不臥床」這樣做</h2>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">👐 照服員怎麼做</div><div class="role-bd"><ul>
    <li><b>白天離床：</b>三餐到餐桌、安排坐輪椅或扶手椅，目標白天盡量不在床上。</li>
    <li><b>循序漸進：</b>從床邊坐起 → 坐床緣 → 移到椅子，每天延長離床時間。</li>
    <li><b>擺位正確：</b>坐姿髖膝踝 90 度、雙腳踏地，避免滑坐、歪斜。</li>
    <li><b>安全防護：</b>剛開始離床有人在旁，注意姿勢性低血壓（頭暈）。</li>
    <li><b>觀察記錄：</b>離床時間、耐受度、有無頭暈疲累。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🩺 護理師把關什麼</div><div class="role-bd"><ul>
    <li><b>評估可否離床：</b>生命徵象、心肺耐受、骨折／傷口禁忌。</li>
    <li><b>訂進度目標：</b>依體能設定每日離床時數與活動量。</li>
    <li><b>防併發症：</b>監測姿勢性低血壓、壓傷風險，調整復能計畫。</li>
    <li><b>跨專業協調：</b>必要時連結物理治療師做離床與站立訓練。</li>
  </ul></div></div>
</div>`},

/* 10 practice: transfer */
{toc:"操作｜移位省力", html:`
<span class="num-chip">PART 4 — 操作篇</span>
<h2 class="heading">移位：省力，也讓他出力</h2>
<p class="lede">移位是自立支援與職業傷害的交會點：原則是<b>零抬舉（zero-lift）</b>──用長輩自己的力量＋輔具，而不是照顧者硬抬。</p>
<div class="steps">
  <div class="step"><div class="body"><h4>先說、先準備</h4><p>告知長輩要做什麼、請他配合；輪椅煞車、移開腳踏板、床面調到適當高度。</p></div></div>
  <div class="step"><div class="body"><h4>髖關節絞鏈、近身</h4><p>照顧者屈髖屈膝、背挺直，重心壓低，靠近長輩；用腿力不用腰力。</p></div></div>
  <div class="step"><div class="body"><h4>引導他出力</h4><p>口令「一、二、三，站」，請他雙手撐扶手、身體前傾、自己站起，照顧者只做引導與穩定。</p></div></div>
  <div class="step"><div class="body"><h4>善用輔具</h4><p>移位滑墊、轉位盤、移位腰帶、移位機，依長輩能力選用，保護雙方安全。</p></div></div>
</div>`},

/* 安全轉移位：零抬舉 + 髖鉸鍊（含實拍圖） */
{toc:"操作｜零抬舉轉移位", html:`
<span class="num-chip">PART 4 — 操作篇</span>
<h2 class="heading">零抬舉：保護長輩，也保護你的腰</h2>
<p class="lede">照顧者的職業傷害多在腰背。<b>零抬舉政策（No-Lift Policy）</b>是國際照護潮流，核心三原則讓轉移位既安全又省力。</p>
<div class="steps">
  <div class="step"><div class="body"><h4>個案功能最大發揮</h4><p>能站就站起來轉位、站不穩就坐姿轉、連坐都不穩才躺著移。鼓勵長輩自己出力，而非整個抬。</p></div></div>
  <div class="step"><div class="body"><h4>水平取代垂直</h4><p>用<b>推、滑、平移</b>取代抬起。善用扶手可掀、腳靠可拆的輪椅，與移位滑墊、滑板。</p></div></div>
  <div class="step"><div class="body"><h4>適切使用輔具</h4><p>移位腰帶、滑墊、滑板、移位機，依長輩能力選用，保護雙方安全。</p></div></div>
</div>

/* 不尿布 */
{toc:"不尿布｜操作", html:`
<div style="margin-bottom:.3em"><span class="op-tag no">三不・不尿布</span></div>
<h2 class="heading">「不尿布」這樣做</h2>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">👐 照服員怎麼做</div><div class="role-bd"><ul>
    <li><b>記錄排泄型態：</b>先連續記 2–3 天的排尿排便時間，找出規律。</li>
    <li><b>定時引導：</b>依規律＋餐後反射，主動帶長輩上廁所，而非等他開口。</li>
    <li><b>環境配合：</b>動線清楚、扶手穩、衣著好穿脫（鬆緊帶、魔鬼氈）。</li>
    <li><b>夜間過渡：</b>可先用便盆椅、尿壺，再逐步減少夜尿布。</li>
    <li><b>態度：</b>給時間與隱私，失禁不責備，鼓勵每一次成功。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🩺 護理師把關什麼</div><div class="role-bd"><ul>
    <li><b>評估失禁原因：</b>區分尿路感染、攝護腺、藥物、功能性失禁。</li>
    <li><b>訂如廁計畫：</b>設計排尿訓練時間表、目標與評值。</li>
    <li><b>皮膚把關：</b>監測會陰皮膚、預防失禁性皮膚炎與壓傷。</li>
    <li><b>必要轉介：</b>反覆感染或滯尿等問題轉介醫師處理。</li>
  </ul></div></div>
</div>`},

/* 要喝水 */
{toc:"要喝水｜操作", html:`
<div style="margin-bottom:.3em"><span class="op-tag yes">四要・要喝水</span></div>
<h2 class="heading">「要喝水」這樣做</h2>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">👐 照服員怎麼做</div><div class="role-bd"><ul>
    <li><b>分次給：</b>把目標水量拆到各時段（如每小時 100–150cc），搭配三餐、服藥、活動後。</li>
    <li><b>投其所好：</b>不愛白開水可用無糖茶、湯、果汁、果凍、高水分水果替代部分。</li>
    <li><b>容易取得：</b>水杯放手邊、用雙耳杯或附吸管杯，方便自己拿。</li>
    <li><b>記錄飲水量：</b>用有刻度水壺或飲水記錄表，逐筆登記、累計到目標。</li>
    <li><b>觀察：</b>尿量、尿色（深黃＝可能不足）、口乾、皮膚乾燥。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🩺 護理師把關什麼</div><div class="role-bd"><ul>
    <li><b>定每日目標量：</b>一般約 1500cc，但<b>心衰、腎功能不全、限水醫囑者須個別下修</b>。</li>
    <li><b>吞嚥評估：</b>易嗆咳者評估吞嚥、決定增稠程度與安全姿勢。</li>
    <li><b>監測脫水／水中毒：</b>看出入量、體重、電解質與水腫。</li>
    <li><b>異常處理：</b>持續不足或拒飲時，調整方式或評估點滴需求。</li>
  </ul></div></div>
</div>`},

/* 要進食 */
{toc:"要進食｜操作", html:`
<div style="margin-bottom:.3em"><span class="op-tag yes">四要・要進食</span></div>
<h2 class="heading">「要進食」這樣做</h2>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">👐 照服員怎麼做</div><div class="role-bd"><ul>
    <li><b>姿勢到位：</b>坐起 90 度、雙腳踏地、頭微前傾（下巴微收）降低嗆咳。</li>
    <li><b>讓他自己吃：</b>用防滑墊、加高邊餐盤、粗柄／彎柄餐具，做得到的不代勞。</li>
    <li><b>適當協助：</b>只在卡關處幫忙（固定碗、舀第一口），一餐抓 30–45 分鐘不催。</li>
    <li><b>觀察吞嚥：</b>留意嗆咳、口中積食、進食量，餐後維持坐姿一段時間。</li>
    <li><b>記錄：</b>進食比例（如吃了幾成）、嗆咳次數、體重變化趨勢。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🩺 護理師把關什麼</div><div class="role-bd"><ul>
    <li><b>吞嚥／營養評估：</b>判定食物質地分級（軟質、剁碎、糊狀）與安全進食方式。</li>
    <li><b>防誤吸：</b>高嗆咳風險者訂進食規範，必要時會診語言治療師。</li>
    <li><b>營養把關：</b>監測體重、白蛋白等，連結營養師調整菜單。</li>
    <li><b>管灌決策：</b>由口進食風險過高時，評估暫時性管灌與重啟由口計畫。</li>
  </ul></div></div>
</div>`},

/* 要運動 */
{toc:"要運動｜操作", html:`
<div style="margin-bottom:.3em"><span class="op-tag yes">四要・要運動</span></div>
<h2 class="heading">「要運動」這樣做</h2>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">👐 照服員怎麼做</div><div class="role-bd"><ul>
    <li><b>融入生活：</b>讓長輩自己走到餐廳、廁所，把日常動作當運動。</li>
    <li><b>每日活動：</b>扶著走、原地踏步、坐姿抬腿、手部運動，搭配音樂更有動機。</li>
    <li><b>有意義的活動：</b>摺毛巾、澆花、擦桌，讓「動」有目的、有成就感。</li>
    <li><b>安全第一：</b>穿防滑鞋、用助行器，注意疲累與喘，量力而為。</li>
    <li><b>記錄：</b>步行距離／步數、活動項目與耐受度。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🩺 護理師把關什麼</div><div class="role-bd"><ul>
    <li><b>評估活動耐受：</b>心肺功能、平衡、跌倒風險，定可行的運動強度。</li>
    <li><b>訂活動處方：</b>與物理治療師合作設計個別化活動／復能內容。</li>
    <li><b>監測反應：</b>活動中喘、胸痛、血氧下降等警訊的處置。</li>
    <li><b>進度評值：</b>定期用巴氏量表等檢視功能變化、調整目標。</li>
  </ul></div></div>
</div>`},

/* 要排便 */
{toc:"要排便｜操作", html:`
<div style="margin-bottom:.3em"><span class="op-tag yes">四要・要排便</span></div>
<h2 class="heading">「要排便」這樣做</h2>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">👐 照服員怎麼做</div><div class="role-bd"><ul>
    <li><b>記排便表：</b>逐日記錄排便時間、性狀（可用布里斯托量表分型）、量。</li>
    <li><b>把握三要素：</b>足夠水分＋膳食纖維＋活動，是順暢排便的基礎。</li>
    <li><b>善用反射：</b>餐後 30 分鐘帶如廁，利用胃結腸反射。</li>
    <li><b>姿勢協助：</b>坐馬桶、腳踩小板凳模擬蹲姿，比躺著用便盆順。</li>
    <li><b>觀察回報：</b>超過 3 天未解、腹脹、硬便或腹瀉即回報。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🩺 護理師把關什麼</div><div class="role-bd"><ul>
    <li><b>評估便祕風險：</b>水分、纖維、活動、藥物（如鴉片類）造成的影響。</li>
    <li><b>處置便祕：</b>依醫囑使用軟便劑／緩瀉劑，必要時處理糞便嵌塞。</li>
    <li><b>警覺異常：</b>辨識腸阻塞、血便、持續腹瀉等需就醫的徵象。</li>
    <li><b>個別計畫：</b>建立規律排便目標與用藥調整，避免長期依賴瀉劑。</li>
  </ul></div></div>
</div>`},

/* ===== PART 5: myth-busters for 三不四要 ===== */

/* myth intro */
{toc:"迷思破解｜總說", html:`
<span class="op-eyebrow">PART 5・迷思破解</span>
<h2 class="heading">這些話，你一定聽過</h2>
<p class="lede">推自立支援時，最大的阻力常常不是技術，而是一句句「聽起來很有道理」的迷思。接下來七項，每項挑常見的說法，<b>先判斷對錯，再看怎麼處理</b>。</p>
<div class="callout"><h5>怎麼玩</h5><p>每題點「○正確」或「✕錯誤」，系統會立刻告訴你答案與背後的處理原則。<b>先猜猜看再點開</b>，印象更深；也很適合拿來考考同事或家人。</p></div>`},

/* 不約束 myths */
{toc:"迷思｜不約束", html:`
<div style="margin-bottom:.3em"><span class="myth-label no">三不・不約束</span></div>
<h2 class="heading">關於「不約束」</h2>
`+
myth("「不綁起來，他跌倒受傷誰負責？所以約束比較安全。」",'false',
"<b>約束不等於安全。</b>研究顯示約束反而增加壓傷、攣縮、譫妄，掙脫時的傷害可能更嚴重。正解是找出跌倒原因、用降床／地墊／感應器等替代，並與團隊家屬共同承擔風險、留下評估記錄。")+
myth("「長輩一直想拔鼻胃管，只能綁手才能保住管路。」",'false',
"<b>先問為什麼想拔，而不是先綁。</b>拔管常因不適、癢、不理解。處理：改善管路固定、處理不適、用衣物遮蓋轉移注意力，必要時請護理師評估是否仍需此管路。約束是最後手段、需評估與時限。")+
myth("「真的有立即危險時，短時間約束須經評估、有時限、要記錄。」",'true',
"<b>正確。</b>零約束不是零容忍到罔顧安全。緊急且無替代時，約束須經專業評估、訂明確時限、持續再評估並完整記錄，且應盡快解除──這正是專業與隨意綁人的差別。")},

/* 不臥床 myths */
{toc:"迷思｜不臥床", html:`
<div style="margin-bottom:.3em"><span class="myth-label no">三不・不臥床</span></div>
<h2 class="heading">關於「不臥床」</h2>
`+
myth("「長輩生病了就該多休息、躺著養，體力才會恢復。」",'false',
"<b>過度臥床反而越養越虛。</b>完全臥床每週肌力可流失逾一成，還增加壓傷、肺炎、血栓。正解：在病況允許下盡早離床，循序漸進，由護理師評估可離床的時機與強度。")+
myth("「他坐一下就喊累喊頭暈，代表不適合離床。」",'false',
"<b>頭暈多半是姿勢性低血壓或太久沒坐，不是不能離床。</b>處理：起身放慢、先搖高床頭適應、從短時間開始慢慢拉長，並觀察記錄。持續異常再請護理師評估。")+
myth("「離床時間要循序漸進，從床邊坐起慢慢延長。」",'true',
"<b>正確。</b>不臥床不是硬把人拉起來久坐。階梯是：床頭搖高→床邊坐穩→移到椅子→延長時間，全程注意安全與耐受度，必要時連結物理治療師。")},

/* 不尿布 myths */
{toc:"迷思｜不尿布", html:`
<div style="margin-bottom:.3em"><span class="myth-label no">三不・不尿布</span></div>
<h2 class="heading">關於「不尿布」</h2>
`+
myth("「包尿布比較方便又乾淨，不用一直帶他跑廁所。」",'false',
"<b>方便的是照顧者，受損的是長輩。</b>長期包尿布會讓原本能控制的功能退化，並增加失禁性皮膚炎與自尊受損。正解：記錄排尿規律、定時引導如廁，尿布逐步當過渡而非預設。")+
myth("「他已經失禁了，排尿訓練不可能再有用。」",'false',
"<b>很多失禁是『功能性』的，可以改善。</b>常因來不及到廁所、衣著難脫、環境不友善造成。處理：定時帶如廁、改善動線與衣著、請護理師評估有無感染或藥物因素。")+
myth("「先記錄 2–3 天排尿時間，找出規律再安排定時如廁。」",'true',
"<b>正確。</b>這是減尿布的標準起手式。先掌握長輩自己的排尿節奏，再搭配餐後反射定時引導，比盲目定時更有效，成功率也更高。")},

/* 要喝水 myths */
{toc:"迷思｜要喝水", html:`
<div style="margin-bottom:.3em"><span class="myth-label yes">四要・要喝水</span></div>
<h2 class="heading">關於「要喝水」</h2>
`+
myth("「喝水容易嗆到，乾脆少給一點比較安全。」",'false',
"<b>少喝水換來的是脫水、譫妄、便祕、泌尿道感染。</b>正解不是少給，而是請護理師評估吞嚥、依需要把水增稠、調整姿勢小口喝，讓他『安全地喝夠』。")+
myth("「自立支援說要喝水，那每個長輩都該喝足 1500cc。」",'false',
"<b>1500cc 是一般參考值，不是人人適用。</b>心臟衰竭、腎功能不全或有限水醫囑者必須個別下修。每日目標量應由護理師依個別狀況訂定，照服員照表執行並回報。")+
myth("「不愛喝白開水，可用無糖茶、湯、果凍等補充部分水分。」",'true',
"<b>正確。</b>達標重點是『總水分』與『喝得下』。在無禁忌下，用長輩接受的飲品與高含水食物分次補充，比強迫灌白開水更實際、也更尊重意願。")},

/* 要進食 myths */
{toc:"迷思｜要進食", html:`
<div style="margin-bottom:.3em"><span class="myth-label yes">四要・要進食</span></div>
<h2 class="heading">關於「要進食」</h2>
`+
myth("「他吃很慢又掉滿地，餵他比較快又乾淨。」",'false',
"<b>每次代勞，都是奪走一次練習。</b>正解：給防滑墊、加高邊餐盤、粗柄餐具，讓他自己吃，只在卡關處協助，一餐抓 30–45 分鐘不催促。慢，是進步的過程。")+
myth("「年紀大了食慾差、吃不多是正常的，不用太在意。」",'false',
"<b>持續吃不夠會導致肌少、體重下降、免疫力差。</b>不該當『正常』放著。處理：找原因（口腔、吞嚥、便祕、情緒、藥物），調整質地與環境，必要時請護理師、營養師介入。")+
myth("「容易嗆咳的長輩，食物質地要由護理師評估分級。」",'true',
"<b>正確。</b>進食安全的核心是『質地對』。高嗆咳風險者需專業評估吞嚥、決定軟質／剁碎／糊狀分級與安全姿勢，必要時會診語言治療師，照服員依規範執行並觀察。")},

/* 要運動 myths */
{toc:"迷思｜要運動", html:`
<div style="margin-bottom:.3em"><span class="myth-label yes">四要・要運動</span></div>
<h2 class="heading">關於「要運動」</h2>
`+
myth("「運動是復健師的事，照服員不用管活動。」",'false',
"<b>真正的復能在日常生活裡，不只在復健室。</b>照服員讓長輩自己走到餐廳、廁所，安排摺毛巾、澆花等有意義的活動，就是最有效的『日常運動』。復健師訂處方，照服員落實在生活。")+
myth("「長輩走路會喘，代表不該讓他動，要多休息。」",'false',
"<b>該評估，不是該停。</b>輕微喘可能只是久沒動、體能差。處理：請護理師評估活動耐受與強度，從低強度開始、監測反應；真有胸痛、血氧下降等警訊才停並處置。完全不動只會更退化。")+
myth("「把日常動作（自己走去餐桌）當運動，也算數。」",'true',
"<b>正確。</b>對失能長輩，『把生活當運動』往往比額外運動更可行、更有動機。每個自己完成的動作都在維持功能──這正是自立支援『用進廢退』的精神。")},

/* 要排便 myths */
{toc:"迷思｜要排便", html:`
<div style="margin-bottom:.3em"><span class="myth-label yes">四要・要排便</span></div>
<h2 class="heading">關於「要排便」</h2>
`+
myth("「幾天沒大便沒關係，用瀉劑解決最快。」",'false',
"<b>長期依賴瀉劑會讓腸子更懶。</b>正解：先從水分、纖維、活動三要素改善，善用餐後反射定時如廁、用蹲姿（腳踩小板凳）。軟便劑／緩瀉劑須依醫囑，不是第一選擇。")+
myth("「躺在床上用便盆解便，跟坐馬桶效果一樣。」",'false',
"<b>姿勢差很多。</b>坐姿（甚至略蹲）讓直腸角度更順、更好出力；躺著解便費力又易解不乾淨。處理：盡量協助坐到馬桶或便盆椅，腳下墊小板凳模擬蹲姿。")+
myth("「超過 3 天未解、腹脹、血便等，要回報護理師。」",'true',
"<b>正確。</b>照服員負責記錄與警覺、即時回報；護理師評估便祕原因、處理嵌塞、辨識腸阻塞或血便等需就醫徵象。分工清楚，才不會把危險徵象當小事拖延。")},

{toc:"隨堂測驗 ②", quiz:2, html:`

/* ===== PART 6: advanced practice (OT perspective) ===== */

/* intro */
{toc:"進階｜職治觀點", html:`
<span class="op-eyebrow">PART 6・進階實務</span>
<h2 class="heading">從職能治療師的視角再深入</h2>
<p class="lede">這一段整合職能治療專業觀點，補上現場最需要的進階主題：<b>復能與復健的差別、功能性運動、輔具運用</b>，以及穿衣、沐浴、排便等日常的自立做法。讓「自己做」不只是理念，而是有方法、有工具。</p>
<div class="callout"><h5>核心一句話</h5><p>「看見缺陷，你會發現問題；<b>看見優勢，你會發現希望</b>。」自立支援的起點，是先看長輩「還能做什麼」。</p></div>`},

/* 復能 vs 復健 */
{toc:"進階｜復能vs復健", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">復能 ≠ 復健</h2>
<p class="lede">兩者常被混用，但概念不同。<b>復健以「疾病、能力」為中心</b>（練肌力、關節角度）；<b>復能以「人、功能」為中心</b>（能不能自己吃飯、走到廁所）。復能涵蓋復健，但目標是恢復生活功能。</p>
<div class="role-wrap">
  <div class="role-card nurse"><div class="role-hd">🏥 復健（能力過程）</div><div class="role-bd"><ul>
    <li>以<b>疾病</b>為中心，專業團隊主導</li><li>練肌力、耐力、關節活動度、平衡</li><li>多在醫院、單次時間短</li><li>處理「腳沒力、抬不高」這類能力問題</li>
  </ul></div></div>
  <div class="role-card care"><div class="role-hd">🌱 復能（功能目標）</div><div class="role-bd"><ul>
    <li>以<b>人</b>為中心，個案參與度高</li><li>目標是吃飯、走路、穿衣、如廁等生活功能</li><li>可在家或生活場域、單次時間長</li><li>成本低、CP 值高，直接對準生活</li>
  </ul></div></div>
</div>
<div class="callout"><h5>怎麼分辨</h5><p>「肌力不足、平衡變差、腳抬不高」是<b>復健</b>面向；「無法穿脫衣物、無法吃飯、不能外出」是<b>復能</b>面向。自立支援要的是把能力，最終用回到生活功能上。</p></div>`},

/* PAC 與導入自立支援 */
{toc:"政策｜PAC與復能機構", html:`
<span class="op-eyebrow">政策現況・會變動</span>
<h2 class="heading">護理之家能變「復能機構」嗎？</h2>
<p class="lede">可以，而且<b>已經有人在做</b>。護理之家不只是「終點站」，也能是讓長輩「回家」的復能中繼站。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">有</span>已有實例與資格</h4><p>護理之家可參與健保 <b>PAC（急性後期整合照護）</b>。例如重建樂活護理之家參與衛福部護理之家 PAC 試辦，中風個案每日復健費約 2,035 元、<b>返家率達 76–80%</b>。長照 3.0 也把 PAC 失能者納入、強調「<b>復能不中斷</b>」。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">件</span>要具備什麼條件</h4><ul><li>具備<b>復健團隊</b>（物理／職能／語言治療師）</li><li>向<b>健保署申請</b>承作 PAC 資格、符合計畫規範</li><li>有個別化照護計畫與成效記錄能力</li><li>空間能融入訓練（走廊扶手、坡道、墊區）</li></ul></div>
</div>
<div class="callout"><h5>怎麼導入自立支援技術？</h5><p>參考彰化等地經驗，路徑是：<b>① 衛生局／機構辦工作坊培訓人力 → ② 治療師評估、擬個別化目標 → ③ 照服員每日帶領執行（如肌力、坐站訓練）並記錄進度 → ④ 用數據檢視成效、滾動調整</b>。關鍵仍是「全機構共識＋專業評估＋日常落實」三者缺一不可。</p></div>
<p class="footnote">資料來源：護理師公會、Ankecare 報導（重建樂活、信義廣慈）；健保署 PAC 計畫；公視復能報導。PAC 資格與給付以健保署最新規範為準。</p>`},

/* ZIZIBABA 體驗 */
{toc:"進階｜照顧者體驗", html:`
<span class="op-eyebrow">換位・親身體驗</span>
<h2 class="heading">當一次「被照顧的人」</h2>
<p class="lede">日本與台灣的訓練常讓照顧者<b>親身體驗被照顧</b>，這是觀念翻轉最有力的一課。唯有自己感受過，才懂長輩的不舒服與失尊嚴。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">驗</span>體驗項目</h4><ul>
    <li><b>不當尿布：</b>包上用茶、味噌、麵粉特製的「排泄物」尿布，感受濕黏不適</li>
    <li><b>不當約束：</b>被綁在輪椅或床上四小時不能動</li>
    <li><b>不當餵食：</b>吃攪在一起的絞碎食物</li>
  </ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">語</span>不當照顧語言</h4><p>「吃快一點」「你有包尿布，尿下去沒關係」──這些習以為常的話，站在被照顧者立場聽，是多麼傷人。<b>體驗，是為了當更好的照顧者。</b></p></div>
</div>
<div class="callout warn"><h5>為什麼有效</h5><p>實證一致指出：成功推動自立支援的關鍵，是<b>從態度與認知著手</b>。技術可以教，但唯有觀念翻轉，照顧者才會真心「忍住不代勞」。</p></div>`},

/* 功能性運動八大動作 + 光譜 */
{toc:"進階｜功能性運動框架", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">功能性運動：八大動作</h2>
<p class="lede">功能性運動有一個從<b>孤立（單一肌群）到整合（多關節協調）</b>的連續光譜。越貼近真實生活的動作，功能性越高。對長輩，整合型動作（如坐站、走路）最實用。</p>
<div class="spectrum">
  <div class="spec-ends"><span>孤立型 isolation<br>（功能性較低）</span><span style="text-align:right">整合型 integration<br>（功能性較高）</span></div>
  <div class="spec-bar"></div>
</div>
<div class="move-grid">
  <div class="move-chip"><div class="mv">走路</div><div class="en">Walk</div></div>
  <div class="move-chip"><div class="mv">深蹲</div><div class="en">Squat</div></div>
  <div class="move-chip"><div class="mv">弓步蹲</div><div class="en">Lunge</div></div>
  <div class="move-chip"><div class="mv">推・拉</div><div class="en">Push/Pull</div></div>
  <div class="move-chip"><div class="mv">抬舉</div><div class="en">Lift</div></div>
  <div class="move-chip"><div class="mv">延伸取物</div><div class="en">Reach</div></div>
  <div class="move-chip"><div class="mv">踮腳尖</div><div class="en">Heel raise</div></div>
  <div class="move-chip"><div class="mv">軀幹旋轉</div><div class="en">Rotate</div></div>
</div>
<div class="callout"><h5>走路是基本功</h5><p>走路訓練要看：<b>安全、強度、速度、距離、斜坡、樓梯</b>。它是所有功能性動作的根基，也是自立支援最核心的目標。</p></div>`},

/* 坐站運動（含實拍圖） */

/* 坐站運動的扶手協助 */
{toc:"進階｜坐站扶手協助", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">坐站運動，扶手怎麼搭？</h2>
<p class="lede">機構帶坐站運動時，<b>合適的扶手</b>能讓長輩安全地自己出力，而不是被人拉起來。重點在<b>扶手的高度與位置</b>。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">高</span>扶手「略高一點」更好</h4><p>研究發現，坐站／轉位時長輩偏好抓握在<b>身高的 70–90%（約肩膀高度）</b>。比一般想像的<b>略高一些</b>──較高的抓握點能讓<b>軀幹更穩、更好控制、手臂更省力</b>，跌倒風險也較低。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">做</span>怎麼帶</h4><ul><li>扶手放<b>身體正前方略高處</b>，不是兩側低處</li><li>腳收到膝蓋下、臀部移到椅子前緣</li><li>身體前傾「鼻子過膝」再站起</li><li>用手「<b>推</b>」扶手借力，不是用手「拉」</li><li>口令：「準備，1、2、3，站」</li></ul></div>
</div>
<div class="callout warn"><h5>安全提醒</h5><p>扶手／輔具務必<b>穩固、有止滑</b>。鼓勵長輩盡量自己出力，照顧者在旁<b>保護而非代勞</b>。會頭暈（姿勢性低血壓）放慢，有不適立即停止。實際高度仍需依個別身形由治療師微調。</p></div>
<p class="footnote">參考：JMIR Rehab (2025) 抓握位置生物力學研究（偏好身高 70–90%、約肩高；42 吋高扶手對軀幹控制較佳）。</p>`},

/* 坐姿軀幹運動 */
{toc:"進階｜坐姿軀幹運動", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">坐姿軀幹運動，怎麼做不跌？</h2>
<p class="lede">軀幹往前、往兩側活動能練平衡與核心，但單位常擔心<b>長輩會跌出椅子</b>。其實有更安全的做法。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">椅</span>(a) 防跌的擺位法</h4><p>傳統做法是換到一張<b>骨盆位置稍低、膝蓋稍高</b>的椅子（髖低膝高），讓重心後傾、卡進椅子裡，這樣往前往兩側動都<b>不容易滑出去</b>。更好的做法：用<b>有扶手、椅背、防滑坐墊</b>的穩固椅子，前方放一張桌子當「界線」與支撐，長輩動時手可扶桌、心理也更安心。照顧者站在<b>動作方向那一側</b>保護。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">輪</span>(b) 直接在輪椅上做</h4><ul><li>先<b>固定煞車、雙腳踏地或踏板</b></li><li>繫上<b>骨盆帶（擺位帶）</b>拉住骨盆防前滑</li><li>動作<b>幅度由小漸大</b>，先在安全範圍內</li><li>前方放餐桌板／桌子，手可扶可撐</li><li>照顧者在側保護，<b>從穩定方向先練</b></li></ul></div>
</div>
<div class="callout"><h5>核心觀念</h5><p>怕跌不該變成「不准動」。用<b>對的椅子、對的擺位、對的保護</b>，就能讓長輩安全地練軀幹控制──而軀幹穩了，坐、站、走、自己吃飯都會更穩。</p></div>
<p class="footnote">註：軀幹運動的範圍與方式須依長輩平衡與能力由治療師評估設計，照顧者依指導執行並全程注意安全。</p>`},

/* 腳踏車與賦能動機 */
{toc:"進階｜腳踏車與賦能", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">復健腳踏車，怎麼帶出動機？</h2>
<p class="lede">復健腳踏車（臥式／坐式腳踏車）雖然不完全等同自立支援的賦能精神，但它<b>門檻低、好上手、看得到數字</b>，是帶長輩「動起來、有動機」的好工具。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">易</span>為什麼容易參與</h4><ul><li>坐著就能做，<b>安全、不怕跌</b></li><li>阻力可調，<b>再虛弱也能開始</b></li><li>有<b>圈數、時間、距離</b>等數字回饋</li><li>可看電視、聊天邊踩，不無聊</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">能</span>怎麼建立賦能意識</h4><ul><li><b>設小目標：</b>今天比昨天多踩 2 分鐘</li><li><b>讓他看見進步：</b>記錄圈數、貼進度表</li><li><b>給選擇權：</b>讓他決定踩多久、配什麼音樂</li><li><b>公開鼓勵：</b>達標給掌聲、頒小獎狀</li><li>從「要我踩」變成「<b>我想踩</b>」</li></ul></div>
</div>
<div class="callout"><h5>從工具到精神</h5><p>腳踏車本身是器材，但<b>「讓他自己設定、自己看見、自己決定」的過程，就是賦能</b>。當長輩體會到「我做得到、我有進步、我能選擇」，動機就會從外在要求，轉成內在的「我想要」──這正是自立支援的核心。</p></div>
<p class="footnote">註：使用復健腳踏車前須評估心肺與關節狀況，阻力與時間由專業依個別狀況調整。</p>`},

/* 進食輔具（含實拍圖） */
{toc:"進階｜進食輔具", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">輔具，讓「自己吃」成真</h2>
<p class="lede">輔具的選用原則是<b>「用功能選，不是用疾病選」</b>──看長輩缺什麼功能，就補什麼。合適的餐具能讓手抖、握力差、單手的長輩也能自己吃。</p>

/* 輔具挑選總原則 */
{toc:"輔具｜挑選總原則", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">挑輔具：用功能選，不是用疾病選</h2>
<p class="lede">同樣是中風，有人能自推輪椅、有人不能。輔具不是「這個病用這個」，而是<b>看長輩缺什麼功能、生活裡要做什麼，就補什麼</b>。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">人</span>先了解「人」</h4><ul><li>還有哪些能力？哪裡卡住？</li><li>單側無力、平衡差、握力弱、認知狀況</li><li>體型、體重、慣用手</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">事</span>再了解「事」</h4><ul><li>要在哪用？（室內、戶外、廁所）</li><li>誰來操作？（自己用還是照顧者協助）</li><li>食、衣、住、行、育、樂哪個面向</li></ul></div>
</div>
<div class="callout warn"><h5>三個常見錯誤</h5><p>一是<b>買太大或太小</b>（沒量身）；二是<b>能力被輔具取代</b>（明明能走卻整天坐輪椅，越坐越退化）；三是<b>只買不教</b>。輔具是支持自立的工具，不是讓人更依賴的藉口。</p></div>`},

/* 輪椅挑選 */
{toc:"輔具｜輪椅怎麼挑", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">輪椅怎麼挑</h2>
<p class="lede">輪椅不是越大越舒服。<b>坐姿擺位</b>是關鍵──坐對了，長輩才坐得穩、坐得久、不滑下去，也才能自己操作。</p>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">📏 尺寸要合身</div><div class="role-bd"><ul>
    <li><b>座寬：</b>臀部兩側各留約一個手掌寬，太寬會歪斜、太窄會壓迫。</li>
    <li><b>座深：</b>膝窩留約 2–3 指空隙，太深會壓膝窩、骨盆後傾。</li>
    <li><b>座高／腳踏：</b>雙腳能平踏，大腿與座面服貼。</li>
    <li><b>骨盆帶位子很重要：</b>固定在<b>髂前上棘</b>下方拉住骨盆，防止往前滑。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">⚙️ 功能要對需求</div><div class="role-bd"><ul>
    <li><b>能自推：</b>選輕量、大後輪、扶手腳靠可拆掀（利轉位）。</li>
    <li><b>需久坐／擺位差：</b>考慮高背、可仰躺、空中傾倒（tilt）。</li>
    <li><b>易壓傷：</b>搭配減壓座墊。</li>
    <li><b>常移位：</b>扶手可掀、腳靠可拆，方便水平轉位。</li>
  </ul></div></div>
</div>
<div class="callout"><h5>一個提醒</h5><p>輪椅是「移動工具」，不是「整天的座位」。能離床坐扶手椅、能扶著走的時段，就別一直待在輪椅上。</p></div>`},

/* 讓長輩自己控制輪椅 + 高度 */
{toc:"輔具｜讓長輩自己推", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">讓長輩「自己控制輪椅」有多重要</h2>
<p class="lede">能自己推輪椅，等於把「行動的主導權」還給長輩──想去哪自己去。這對<b>自尊、動機、活動量</b>都是大加分。而能不能自己推，<b>輪椅高度是關鍵</b>。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">高</span>很多輪椅「太高」</h4><p>坐面太高，長輩<b>腳踩不到地</b>，就沒辦法用腳幫忙推、也站不起來，只能等人推。理想是<b>坐著時雙腳掌能平踏地面</b>、膝蓋約 90 度，他才能「腳划船」式自己移動。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">寬</span>很多輪椅「太寬」</h4><p>坐面太寬，長輩<b>手搆不到兩側輪圈</b>、軀幹歪斜不穩，也推不動。座寬以<b>臀部兩側各留約一掌</b>為宜，太寬反而坐不正、推不了。</p></div>
</div>
<div class="callout"><h5>正確挑選，讓他推得動</h5><p>挑能自推的輪椅：<b>坐面高度讓腳踏地、座寬剛好、大後輪、輪圈好握、重量輕</b>。必要時用<b>可調高度</b>的輪椅或加減坐墊微調。一台「合身」的輪椅，能把「被推的人」變回「自己走的人」。</p></div>`},

/* 站立式電動輪椅 vs 站立桌 */
{toc:"輔具｜站立式輪椅", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">站立式電動輪椅，好處在哪？</h2>
<p class="lede">站立式電動輪椅能讓長輩<b>一邊站、一邊移動</b>。站姿本身有很多生理與心理好處，而「能自己移動」更是它的關鍵價值。</p>
<div class="cards">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">益</span>站立的好處</h4><p>規律站立有助<b>改善血液循環、維持骨密度、幫助腸胃蠕動與排便排尿、減少壓傷與關節攣縮、降低肌肉張力</b>。站起來「平視」他人，對<b>情緒與尊嚴</b>也大有幫助。</p></div>
</div>
<div class="role-wrap">
  <div class="role-card nurse"><div class="role-hd">🧍 職能治療站立桌（站立架）</div><div class="role-bd"><ul>
    <li><b>靜態、固定在一個地點</b>，不能移動</li><li>多用於治療時段的被動站立訓練</li><li>長輩站著但<b>哪都去不了</b></li><li>容易變成「站完就收」的訓練器材</li>
  </ul></div></div>
  <div class="role-card care"><div class="role-hd">♿ 站立式電動輪椅</div><div class="role-bd"><ul>
    <li><b>動態、可一邊站一邊移動</b></li><li>長輩<b>自己操作</b>站起、移動、拿東西</li><li>能站著拿高處物品、平視交談、參與生活</li><li>把站立<b>融入日常</b>，不只是訓練</li>
  </ul></div></div>
</div>
<div class="callout"><h5>最大差別：自主與移動</h5><p>站立桌是「<b>被擺在那裡站</b>」，站立式輪椅是「<b>自己站、自己去</b>」。後者多了<b>移動能力與自主性</b>，研究指出能進一步提升獨立性、生活品質與心理健康。當然，它較昂貴、需評估適用性。</p></div>
`+

`<p class="footnote">資料來源：RESNA 支持性站立裝置立場文件；站立架／站立輪椅生理效益文獻。是否適用須由治療師評估，並非人人合適。影片為外部 YouTube 內容，著作權屬原作者。</p>`},

/* 拐杖與助行器挑選 */
{toc:"輔具｜拐杖與助行器", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">拐杖、助行器怎麼挑</h2>
<p class="lede">通則：<b>支撐面越大越穩，但越笨重</b>。依長輩的平衡與肌力，從穩定度需求由低到高選。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">杖</span>拐杖類</h4><ul><li><b>單手杖：</b>輕度不穩、單側稍弱者。</li><li><b>四腳拐：</b>需要更穩者；底部 <b>C 形缺口要朝外</b>，腳才不會踢到。</li><li>握把高度：站直手自然下垂，<b>握把與手腕橫紋齊高</b>，手肘微彎約 20–30 度。</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">行</span>助行器類</h4><ul><li><b>標準型（四腳）：</b>最穩但要抬起前進，適合慢、需高支撐者。</li><li><b>輪式助行器：</b>不必抬、推著走，<b>對衰弱長者更安全省力、步態更順</b>。</li><li>高度同拐杖：與手腕橫紋齊高。</li></ul></div>
</div>
<div class="callout warn"><h5>安全細節</h5><p>所有拐杖、助行器的<b>橡膠腳墊磨平就要換</b>，否則會打滑。使用時東西放身體正前方、重心別過度前傾。拐杖頭部 C 形缺口前後沒差別，但四腳拐底部缺口務必朝外。</p></div>
`+
video("tnkiRJ0RhnA","輪式助行器為什麼比較安全")+
`<p class="footnote">影片為外部 YouTube 內容，著作權屬原作者。輔具選用仍須由治療師依個別狀況評估。</p>`},

/* 穿脫衣與沐浴 ADL */
{toc:"進階｜穿衣與沐浴", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">穿衣、沐浴也能自立</h2>
<p class="lede">穿衣、洗澡是每天都要做的事，也是訓練自理的好機會。對中風或單側無力的長輩，掌握<b>「患側先穿、健側先脫」</b>的口訣，他就能自己完成大半。</p>
<div class="role-wrap">
  <div class="role-card care"><div class="role-hd">👕 穿脫衣原則</div><div class="role-bd"><ul>
    <li><b>穿：患側先</b>──先把不靈活的那側手腳套進衣褲，再穿好側。</li>
    <li><b>脫：健側先</b>──先脫靈活的那側，患側留到最後。</li>
    <li>選好穿脫的衣物：鬆緊帶、魔鬼氈、前開釦、寬鬆。</li>
    <li>善用<b>翹腳、坐板凳</b>穿褲子穿襪，比站著安全。</li>
  </ul></div></div>
  <div class="role-card nurse"><div class="role-hd">🚿 沐浴自立</div><div class="role-bd"><ul>
    <li>用<b>洗澡椅／便盆椅</b>坐著洗，省力又安全。</li>
    <li>長柄海綿、壁掛式給皂，讓他自己洗得到。</li>
    <li>防滑墊、扶手、地面排水順暢，降低跌倒。</li>
    <li>給隱私與時間，能自己洗的部位不代勞。</li>
  </ul></div></div>
</div>
<div class="callout"><h5>環境也要幫忙</h5><p>用<b>文字或圖片標示</b>衣櫃收納（上衣、褲子分格），失智或視力差的長輩就能自己找衣服、自己決定穿什麼──這也是維持自主與尊嚴。</p></div>`},

/* 蹲姿幫助排便 */
{toc:"進階｜排便姿勢", html:`
<span class="num-chip">PART 6 — 進階實務</span>
<h2 class="heading">姿勢對了，排便更順</h2>
<p class="lede">排便順不順，關鍵在<b>肛腸角（anorectal angle）</b>──角度越大、腸道越直，越好出力。姿勢一換，便祕可能就改善，不必急著用瀉劑。</p>
<div class="cards three">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">角</span>三種姿勢比一比</h4><p>研究發現：<b>蹲姿的肛腸角最大、最好排</b>。一般坐姿（大腿與軀幹約 90 度）和稍微抬腿的坐姿（約 60 度）差不多，都不如蹲姿順。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">趴</span>往前趴，更好出力又安全</h4><p>身體<b>往前傾、手肘與前臂撐在大腿或前方平台上</b>（像沉思者「The Thinker」的姿勢），能拉直肛腸角、增加排便量；前臂有支撐時，<b>身體更穩、更省力，腹壓也用得上</b>。對長輩來說，比硬挺著坐或勉強蹲<b>更安全、更實際</b>。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">做</span>實務怎麼做</h4><ul><li>坐馬桶時<b>腳下墊一個小板凳</b>，模擬半蹲，讓膝蓋高於髖部。</li><li>前方放一張<b>穩固的小桌／平台</b>，讓長輩把上半身往前趴、手肘撐著。</li><li>比躺著用便盆順很多，盡量協助坐到馬桶。</li></ul></div>
</div>
<div class="callout"><h5>搭配四要</h5><p>姿勢是「臨門一腳」，但根本還是<b>足夠水分＋纖維＋活動＋餐後反射</b>。姿勢對了、基礎顧好，自然排得順，減少對瀉劑的依賴。</p></div>
<p class="footnote">參考：排便姿勢研究指出，手臂支撐的前傾姿勢（「沉思者」姿勢）可拉直肛腸角、增加排便量；針對長者的研究（Indian J Gastroenterol, 2021）發現此姿勢軀幹前傾約 62 度，肺活量、最大吐氣壓（與出力相關）與主觀舒適度都優於一般坐姿，較適合排便。</p>`},

/* 14 case study */
{toc:"案例分享", html:`
<span class="op-eyebrow">案例分享・真實故事</span>
<h2 class="heading">明好阿嬤的故事</h2>
<p class="lede">78 歲、獨居、駝背，曾因大病臥床半年、坐輪椅近兩年。她說：「筋骨練到很勇，但是不會走路。」</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">前</span>問題在哪</h4><p>每天去醫院復健，肌力其實夠──但回家就坐沙發看電視到睡著，<b>缺的是「在生活裡使用功能」的機會</b>，越坐越退化。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">後</span>怎麼翻轉</h4><p>把復健搬進日常：自己倒水、自己走到餐桌、自己上廁所。給時間、給扶手、給目標，<b>從「被照顧」變回「過生活」</b>。</p></div>
</div>
<div class="callout"><h5>帶走的洞察</h5><p>真正的復能，不在復健室，在<b>每天的生活動作</b>裡。照服員每一次「忍住不代勞」，就是一次最有效的治療。</p></div>`},

/* ===== dementia & cognition ===== */

/* dementia: concept */
{toc:"失智｜自立支援觀念", html:`
<span class="op-eyebrow">特別篇・認知與失智</span>
<h2 class="heading">失智長輩，更需要自立支援</h2>
<p class="lede">失智不等於什麼都不能做。長輩失去的是部分認知功能，<b>但情緒、習慣、身體記憶常還在</b>。自立支援對失智者的目標：<b>維持殘存能力、延緩退化、減少行為精神症狀（BPSD）</b>。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">能</span>看見「還能做的」</h4><p>洗碗、摺衣、澆花這類<b>身體記得的習慣動作</b>，失智長輩往往還做得來。給他熟悉、簡單、有步驟的事做，維持功能也維持價值感。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">藥</span>非藥物優先</h4><p>研究證實懷舊、認知刺激、現實導向、運動、音樂、藝術等<b>非藥物治療</b>，能改善認知退化、減少 BPSD。抗精神病藥有黑框警告風險，須由醫師審慎評估、最低劑量最短時間。</p></div>
</div>
<div class="callout warn"><h5>BPSD 不是「故意找麻煩」</h5><p>躁動、遊走、攻擊等行為，常是長輩在<b>表達沒被滿足的需求</b>──疼痛、便祕、尿路感染、脫水、太吵太熱、孤獨被責備。先找原因，別先壓制。</p></div>`},

/* dementia: how-to */
{toc:"失智｜怎麼做", html:`
<span class="op-eyebrow">特別篇・認知與失智</span>
<h2 class="heading">面對失智長輩，這樣做</h2>
<div class="steps">
  <div class="step"><div class="body"><h4>先排除身體不適</h4><p>躁動時先查：是否疼痛、便祕、尿路感染、脫水、藥物副作用、太餓太累。<b>身體需求滿足了，行為常常就緩解。</b></p></div></div>
  <div class="step"><div class="body"><h4>不爭辯、先同理</h4><p>他說「有人偷我東西」，別反駁。先傾聽、認同情緒，再溫和轉移注意力（拿熟悉的物品、回到熟悉空間）。糾正事實只會升高對立。</p></div></div>
  <div class="step"><div class="body"><h4>建立規律、可預期的生活</h4><p>固定作息、固定流程，降低不安。把日常活動排進每天，讓長輩知道接下來會發生什麼。</p></div></div>
  <div class="step"><div class="body"><h4>簡化、給步驟、給線索</h4><p>一次給一個指令、把動作拆小步驟、用圖示或實物提示。讓他「跟得上」，就能自己完成更多。</p></div></div>
  <div class="step"><div class="body"><h4>善用非藥物活動</h4><p>音樂、老照片懷舊、簡單手作、散步。投其所好、有成就感的活動，能安定情緒、維持功能。</p></div></div>
</div>
<div class="callout"><h5>溝通小提醒</h5><p>面對面、放慢、簡短、語氣溫和；多用肯定句少用否定句。<b>避免單一照顧者</b>，讓長輩習慣多人照顧，對長輩與團隊都更好。嚴重或有傷害風險時，連結失智共照中心或精神科醫師。</p></div>`},

/* 認知復能與玩 */
{toc:"失智｜認知復能與玩", html:`
<span class="op-eyebrow">特別篇・認知與失智</span>
<h2 class="heading">「玩」是維持認知的良藥</h2>
<p class="lede">玩，是人與生俱來的天賦──<b>人不是因為年老而停止玩樂，而是因為停止玩樂才會老</b>。對失智長輩，有意義的活動就是最好的認知復能。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">玩</span>長輩為什麼想玩？</h4><p>他要的可能跟你想的不一樣：<b>有人陪伴、好玩有趣、有成就感、動腦訓練、預防退化、怕無聊</b>。先懂動機，活動才帶得起來。</p></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">感</span>五感認知刺激</h4><p>從<b>視覺、聽覺、嗅覺、味覺、觸覺</b>出發——只要有「輸出」（說出來、動手做），五感刺激就有幫助。懷舊照片、音樂、手作、桌遊都是好工具。</p></div>
</div>
<div class="callout"><h5>學習療法（Learning Therapy）</h5><p>簡單的讀寫、算數、動手動口動腦的活動，<b>建議一週 5 次、一次約 30 分鐘</b>。重點不是難度，而是規律、有互動、有成就感。例如懷舊人物猜謎、撲克牌排七撿紅點、皺紋紙花手作。</p></div>
<p class="footnote">註：活動內容與頻率為一般建議，須依長輩認知程度與興趣個別調整；目標是參與和愉悅，不是考試。</p>`},

/* 失智可預防風險因子 Lancet */
{toc:"失智｜可預防的風險", html:`
<span class="op-eyebrow">特別篇・認知與失智</span>
<h2 class="heading">失智，有近一半是可預防的</h2>
<p class="lede">國際權威《刺胳針》(Lancet) 2024 年報告指出：處理 <b>14 個可改變的風險因子，約能預防或延緩 45% 的失智症</b>。這代表「預防」與「延緩」是真的做得到的。</p>
<div class="cards two">
  <div class="note-card"><span class="pin"></span><h4><span class="ico">控</span>可以努力的方向</h4><ul><li>聽力受損（戴助聽器）、視力受損（就醫矯正）</li><li>高血壓、糖尿病、高膽固醇、肥胖控制</li><li>戒菸、規律運動、避免過量飲酒</li><li>多動腦、多社交、治療憂鬱</li></ul></div>
  <div class="note-card"><span class="pin"></span><h4><span class="ico">動</span>對機構長輩的意義</h4><p>三要的<b>運動</b>、不臥床的<b>活動</b>、認知刺激的<b>動腦與社交</b>，剛好都對準這些風險因子。自立支援的日常，本身就是失智的預防與延緩。</p></div>
</div>
<div class="callout"><h5>三個運動都防失智</h5><p>有氧運動、肌力訓練都被證實有助預防失智（伸展運動則證據較弱）。讓長輩動起來、有事做、有人互動——這就是最好的「大腦保健」。</p></div>
<p class="footnote">資料來源：Lancet Commission on Dementia Prevention 2024 報告（14 項可改變風險因子、約 45% 可預防）。個別狀況仍須由醫師評估。</p>`},

/* 15 daily checklist */
{toc:"明天就能做", html:`
<span class="op-eyebrow">帶回單位・行動清單</span>
<h2 class="heading">明天上班就能做的 5 件事</h2>
<div class="steps">
  <div class="step"><div class="body"><h4>白天請長輩離床坐起用餐</h4><p>哪怕只是床邊坐 10 分鐘，也比整天平躺好。</p></div></div>
  <div class="step"><div class="body"><h4>記錄一位長輩的喝水量</h4><p>用水位杯或表格，讓「夠不夠」變成數字。</p></div></div>
  <div class="step"><div class="body"><h4>挑一個動作「忍住不代勞」</h4><p>例如讓他自己拿湯匙、自己按電梯、自己穿一隻襪子。</p></div></div>
  <div class="step"><div class="body"><h4>幫一位長輩排定時如廁</h4><p>餐後 30 分鐘帶去廁所，記錄成效。</p></div></div>
  <div class="step"><div class="body"><h4>檢視一條約束帶能否拿掉</h4><p>找替代方案，與護理師、家屬討論可行性。</p></div></div>
</div>`},

/* 16 resources / closing */
{toc:"結語與資源", html:`
<span class="eyebrow">結語</span>
<h2 class="heading">我們照顧的，是一個「人」</h2>
<p class="lede">自立支援不是更輕鬆的工作方式，而是<b>更有尊嚴的照顧哲學</b>。它要求我們花更多心思去看見長輩「還能做什麼」，而不是只看見他「不能做什麼」。</p>
<div class="board" style="margin-top:14px">
  <h3>三句話帶回家</h3>
  <p style="font-size:clamp(15px,4.2vw,20px);line-height:2">
  ① 不是不幫，而是幫他自己做。<br>
  ② 能力用進廢退，生活就是最好的復健。<br>
  ③ 三不靠四要撐起，照顧者是教練不是代勞者。
  </p>

function downloadForms(e){
  if(e)e.preventDefault();
  try{
    const bin=atob(FORMS_PDF_B64);
    const len=bin.length;const bytes=new Uint8Array(len);
    for(let i=0;i<len;i++)bytes[i]=bin.charCodeAt(i);
    const blob=new Blob([bytes],{type:"application/pdf"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="自立支援照顧記錄表.pdf";
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1500);
  }catch(err){alert("下載失敗，請改用桌機瀏覽器開啟。");console.error(err);}
}

/* click thumbnail -> load YouTube iframe (autoplay) */
function loadVid(el){
  const id=el.dataset.vid;
  const f=document.createElement('iframe');
  f.src="https://www.youtube-nocookie.com/embed/"+id+"?autoplay=1&rel=0";
  f.allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture";
  f.allowFullscreen=true;
  el.parentNode.appendChild(f); el.remove();
}
/* stop any playing videos (remove iframes) when navigating away */
function stopVideos(){
  document.querySelectorAll('.slide:not(.on) .video iframe').forEach(f=>f.remove());
}

/* ============ ENGINE ============ */
const stage=document.getElementById('stage');
const tocList=document.getElementById('toc-list');
let cur=0;

slides.forEach((s,i)=>{
  const el=document.createElement('section');
  el.className='slide';
  el.innerHTML=s.html;
  stage.appendChild(el);

  const t=document.createElement('button');
  t.className='toc-item';
  t.innerHTML=`<span class="n">${String(i).padStart(2,'0')}</span><span>${s.toc}</span>`;
  t.onclick=()=>{go(i);closeToc();};
  tocList.appendChild(t);
});

const els=[...document.querySelectorAll('.slide')];

function render(){
  els.forEach((e,i)=>e.classList.toggle('on',i===cur));
  document.getElementById('prog').textContent=`${cur+1} / ${slides.length}　·　${slides[cur].toc}`;
  document.getElementById('prev').disabled=cur===0;
  document.getElementById('next').disabled=cur===slides.length-1;
  document.querySelector('#bar i').style.width=((cur)/(slides.length-1)*100)+'%';
  els[cur].scrollTop=0;
  if(typeof stopVideos==='function') stopVideos();
}
function go(i){cur=Math.max(0,Math.min(slides.length-1,i));render();}
function next(){go(cur+1);}
function prev(){go(cur-1);}

document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});

/* swipe */
let sx=0,sy=0;
stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){ dx<0?next():prev(); }
},{passive:true});

/* toc */
const toc=document.getElementById('toc');
document.getElementById('toc-btn').onclick=()=>toc.classList.add('on');
document.querySelector('#toc .close').onclick=closeToc;
function closeToc(){toc.classList.remove('on');}

/* quiz logic */
document.querySelectorAll('.quiz').forEach(q=>{
  const ans=+q.dataset.answer;
  const fb=q.querySelector('.fb');
  q.querySelectorAll('.opt').forEach(btn=>{
    btn.onclick=()=>{
      if(q.dataset.done)return;
      q.dataset.done=1;
      const pick=+btn.dataset.i;
      q.querySelectorAll('.opt').forEach(b=>{
        const bi=+b.dataset.i;
        if(bi===ans)b.classList.add('correct');
        else if(bi===pick)b.classList.add('wrong');
        b.style.cursor='default';
      });
      fb.classList.add('show');
      fb.innerHTML = pick===ans
        ? '✅ <b>答對了！</b> 自立支援的核心就是：給合適的環境與輔具，讓長輩在能力範圍內自己完成，照顧者只在卡關處支援。'
        : '🔎 <b>正解是另一個選項。</b> 重點不是「替他做完」或「放著不管」，而是找出原因、提供替代方案與支持，並與團隊、家屬共同決策。';
    };
  });
});

/* myth-buster logic: each .myth has data-correct = "true" or "false" */
document.querySelectorAll('.myth').forEach(m=>{
  const correct=m.dataset.correct;
  const fb=m.querySelector('.mfb');
  m.querySelectorAll('.mbtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(m.dataset.done)return;
      m.dataset.done=1;
      m.classList.add('disabled');
      const pick=btn.dataset.v;
      const ok=(pick===correct);
      btn.classList.add(ok?'picked-ok':'picked-no');
      m.querySelectorAll('.mbtn').forEach(b=>{
        if(b.dataset.v===correct)b.classList.add('reveal-correct');
      });
      fb.classList.add('show');
      const v=fb.querySelector('.verdict');
      if(v)v.textContent = ok ? '✅ 答對了' : '🔎 再想想';
    });
  });
});

render();
</script>
</body>
</html>
